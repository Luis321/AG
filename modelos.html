    color:"#7C3AED", light:"#EDE9FE", border:"#C4B5FD", text:"#4C1D95",
    functional:`Un modelo organizacional es la forma en que una empresa estructura sus personas, equipos, roles y flujos de trabajo para crear y entregar valor. No es un organigrama — es el sistema completo que define QUIÉN hace QUÉ, CÓMO se coordinan, y POR DÓNDE fluye la información y el valor.

¿POR QUÉ IMPORTA PARA UN AGILE COACH?
Sin entender el modelo organizacional, podés implementar ceremonias ágiles perfectas en equipos que el sistema organizacional condena al fracaso. Las estructuras organizacionales determinan el comportamiento de las personas más que cualquier práctica o framework.

LA LEY DE CONWAY (fundamental):
"Las organizaciones diseñan sistemas que son copias de las estructuras de comunicación de esas organizaciones." — Melvin Conway, 1967.
Si tu organización tiene 4 silos (frontend, backend, QA, ops), va a producir software con 4 capas poco integradas, sin importar cuántas ceremonias ágiles hagas. La arquitectura del producto refleja la arquitectura de la organización.

INVERSE CONWAY MANEUVER:
Si querés cambiar la arquitectura del producto, primero cambiá la estructura de los equipos. Los equipos organizados alrededor de servicios o capacidades de negocio tienden a construir software con esas mismas características.

3 PREGUNTAS CLAVE del diseño organizacional:
1. ¿Los equipos están organizados alrededor de tecnología o alrededor de valor/negocio?
2. ¿Las dependencias entre equipos son pocas y explícitas, o muchas y ocultas?
3. ¿La estructura facilita o impide la entrega autónoma de valor?`,
    technical:`LOS 4 TIPOS DE TOPOLOGÍAS DE EQUIPO (Team Topologies — Skelton & Pais):

1. STREAM-ALIGNED TEAMS (equipos alineados a flujo):
El tipo más importante. Organizados alrededor de un flujo de valor de negocio — un producto, un segmento de cliente, o un journey. Son autónomos y pueden entregar valor end-to-end con mínimas dependencias. Objetivo: que el 80%+ de los equipos sean Stream-Aligned.

2. ENABLING TEAMS (equipos habilitadores):
Ayudan temporalmente a los stream-aligned teams a adquirir capacidades. Son coaches, no "hacedores de tareas". Se miden por su capacidad de hacer que ya no los necesiten.

3. COMPLICATED SUBSYSTEM TEAMS:
Construyen subsistemas técnicos muy complejos que otros equipos consumen. Por ejemplo: motor de machine learning, motor de procesamiento financiero.

4. PLATFORM TEAMS (equipos de plataforma):
Crean y mantienen la plataforma interna que otros equipos usan como servicio. Deben tratar a los stream-aligned teams como sus "clientes". Reducen la carga cognitiva de los otros equipos.

INTERACCIONES ENTRE EQUIPOS (3 modos):
→ Collaboration: dos equipos trabajan juntos intensamente por un período definido para explorar nuevos espacios.
→ X-as-a-Service: un equipo provee algo al otro como servicio con mínima interacción directa.
→ Facilitation: un equipo facilita al otro para que adquiera capacidades (enabling mode).

CARGA COGNITIVA — el concepto central:
Cada equipo tiene un límite de complejidad que puede manejar. Si la carga cognitiva supera ese límite, el equipo ralentiza, comete errores y pierde foco. El diseño organizacional es gestión de la carga cognitiva de los equipos.`,

  {
    id:"estructuras", group:"diseno", title:"Estructuras Clásicas vs Ágiles", icon:"📐",
    color:"#7C3AED", light:"#EDE9FE", border:"#C4B5FD", text:"#4C1D95",
    functional:`La estructura organizacional define los canales de comunicación, la toma de decisiones y el flujo de valor. Cada estructura tiene sus tradeoffs — ninguna es perfecta para todos los contextos.

ESTRUCTURA FUNCIONAL (jerárquica clásica):
Equipos agrupados por función: Frontend, Backend, QA, Ops, Diseño. Cada función tiene su propio jefe.
✓ Especialización profunda, economías de escala, comunidades de práctica naturales.
✗ El valor debe atravesar múltiples silos → Lead Time largo, fricción en handoffs, nadie es dueño end-to-end del producto.

ESTRUCTURA MATRICIAL:
Personas reportan a un manager funcional Y a un project manager. Intentó combinar especialización con orientación a proyectos.
✓ Flexibilidad de recursos, especialización mantenida.
✗ Conflictos de prioridad, "dos jefes", agilidad limitada, alta fricción política.

ESTRUCTURA POR PRODUCTO/STREAM:
Equipos organizados alrededor de un producto o segmento de cliente. Multifuncionales y autónomos.
✓ Ownership end-to-end, lead time corto, autonomía real, accountability clara.
✗ Duplicación de especialistas, comunidades de práctica requieren esfuerzo explícito.

ESTRUCTURA TRIBAL (Spotify Model):
Squads → Chapters → Tribes → Guilds. Los squads son multifuncionales y autónomos. Los chapters agrupan especialistas de diferentes squads para práctica y desarrollo.
✓ Combina autonomía de producto con comunidades de especialistas.
✗ Requiere alta madurez organizacional para funcionar. Spotify misma evolucionó su propio modelo.`,
    technical:`EL MODELO DE SPOTIFY — en detalle:

SQUAD: el equipo base. Multifuncional, autónomo, dueño de una feature area o servicio. Parecido a un Scrum team pero con más autonomía en cómo trabaja.

TRIBE: un grupo de squads que trabajan en áreas relacionadas (ej: "Tribe de Pagos" con 4–8 squads). La Tribe tiene un Tribe Lead (equivalente a tu rol de Tribe Lead en Lilab). Las Tribes son el equivalente del ART en SAFe.

CHAPTER: especialistas de la misma función (ej: todos los backend devs de una Tribe) que se reúnen regularmente para compartir prácticas. El Chapter Lead es el manager formal. Son dentro de la misma Tribe.

GUILD: comunidad de práctica que cruza Tribes. Por ejemplo: Guild de Frontend, Guild de Machine Learning. Son voluntarias, no jerárquicas.

UNFiX MODEL (Jurgen Appelo — evolución post-Spotify):
Propone reemplazar la terminología Spotify con un lenguaje más flexible:
→ Crews: los equipos base (equivalente a squads)
→ Forums: comunidades de práctica (equivalente a guilds)
→ Champions: roles que cruzan equipos (equivalente a chapter leads)
Elimina la rigidez del modelo Spotify preservando el principio de autonomía + alineación.

DISEÑO ANTI-PATRÓN — lo que NO hacer:
→ "Fake Agile": equipos Scrum dentro de una estructura completamente funcional en silos.
→ Component teams: equipos dueños de una capa técnica (solo frontend, solo base de datos) sin ownership de negocio.
→ "Feature teams" con demasiadas dependencias: no son realmente autónomos.`,

  {
    id:"topologias", group:"diseno", title:"Team Topologies en Práctica", icon:"🔗",
    color:"#7C3AED", light:"#EDE9FE", border:"#C4B5FD", text:"#4C1D95",
    functional:`Team Topologies es el framework más completo y práctico para diseñar organizaciones de software modernas. Su premisa central: el diseño de equipos es la decisión arquitectónica más importante que toma una organización tecnológica.

EL PROBLEMA QUE RESUELVE:
Las organizaciones tradicionales copian estructuras de otras sin entender el contexto. El resultado: equipos con demasiadas responsabilidades, dependencias ocultas que bloquean el flujo, y personas con altísima carga cognitiva que no pueden entregar valor de forma sostenible.

EL MODELO EN 3 CAPAS:

CAPA 1 — TIPOS DE EQUIPO (quiénes son):
→ Stream-Aligned: orientados al valor de negocio (el 80%)
→ Platform: reducen la carga cognitiva con servicios internos
→ Enabling: elevan capacidades temporalmente (modo coaching)
→ Complicated Subsystem: resuelven complejidad técnica específica

CAPA 2 — MODOS DE INTERACCIÓN (cómo se relacionan):
→ Collaboration: intensiva, por tiempo limitado, para explorar o resolver algo nuevo
→ X-as-a-Service: uno entrega a otro con mínima fricción (API, plataforma, documentación)
→ Facilitation: uno ayuda al otro a crecer (enabling mode)

CAPA 3 — EVOLUCIÓN EN EL TIEMPO:
Las interacciones deben evolucionar. Un Enabling Team que facilita a un Stream-Aligned Team para que aprenda DevOps, después de 3 meses debe poder retirarse. Si no puede, algo salió mal.

PARA TU ROL COMO TRIBE LEAD:
Tu trabajo no es solo facilitar ceremonias — es diagnosticar si la estructura de la Tribe permite que los squads entreguen valor con mínimas dependencias y carga cognitiva razonable.`,
    technical:`CÓMO APLICAR TEAM TOPOLOGIES EN UNA SOFTWARE FACTORY:

PASO 1 — MAPEAR LOS FLUJOS DE VALOR:
Antes de diseñar equipos, identificar los flujos de valor de negocio. ¿Qué capacidades entregamos a los clientes? Cada flujo de valor debería tener uno o más Stream-Aligned Teams.

PASO 2 — IDENTIFICAR DEPENDENCIAS:
Mapear qué equipos dependen de qué para entregar. Las dependencias frecuentes entre dos equipos son una señal de que deberían fusionarse o de que necesitan un modo de interacción más formal.

PASO 3 — EVALUAR LA CARGA COGNITIVA:
Por equipo: ¿Cuántos repositorios mantienen? ¿Cuántas tecnologías? ¿Cuántos clientes internos? ¿Cuánto trabajo no planificado (soporte, incidentes)? Si la respuesta es "demasiado", hay un problema de diseño.

PASO 4 — DISEÑAR PLATAFORMAS:
Si múltiples Stream-Aligned Teams hacen las mismas cosas (setup de CI/CD, logging, monitoring), crear un Platform Team que lo provea como servicio reduce la carga cognitiva de todos.

SEÑALES DE QUE UN EQUIPO ESTÁ MAL DISEÑADO:
→ Alto WIP — mucho en paralelo, nada terminado
→ Lead Time largo con bajo throughput
→ Muchas reuniones inter-equipo para coordinar
→ "El equipo X nos está bloqueando" aparece en cada retro
→ Las personas no saben bien qué es lo más importante en lo que trabajar

CONEXIÓN CON TU CALARIS FRAMEWORK:
El CALARIS Framework (Contexto · Alineación · Liderazgo · Audiencia · Roadmap · Impactos · Standards) mapea directamente con Team Topologies: el "Contexto" diagnostica si los equipos están bien diseñados; la "Alineación" define las interacciones entre equipos; el "Roadmap" evoluciona la estructura en el tiempo.`,
    visual:{ type:"topologias" },
    questions:[
      {
        q:"Tenés un equipo que en cada retrospectiva menciona que 'el equipo de plataforma los bloquea'. ¿Qué diagnóstico y qué acción proponés?",
        opts:[
          "El equipo de plataforma necesita más personas — el bloqueo es un problema de capacidad",
          "El modo de interacción entre equipos está mal definido. Si se bloquean frecuentemente, deben pasar de X-as-a-Service a Collaboration para resolver el problema de forma conjunta, con un SLA claro y luego volver a X-as-a-Service",
          "El equipo quejoso necesita ser más autónomo y resolver sus propios problemas técnicos",
          "Necesitás más reuniones de sincronización semanal entre ambos equipos"
        ],
        correct:1,
        explanation:"El patrón 'nos bloquean' indica que el modo de interacción está mal configurado. Si el equipo de plataforma debería proveer X-as-a-Service pero en la práctica genera bloqueos, la solución es definir un SLA explícito, pasar temporalmente a Collaboration para resolver el problema de raíz, y luego volver a X-as-a-Service con la expectativa clara. Más reuniones sin cambiar el modo de interacción no resuelve nada."
      },
      {
        q:"¿Cuál es la diferencia entre un Platform Team y un Enabling Team?",
        opts:[
          "Son lo mismo — ambos apoyan a los equipos de desarrollo",
          "El Platform Team provee servicios/herramientas de forma continua (X-as-a-Service); el Enabling Team enseña capacidades temporalmente y luego se retira (si no puede retirarse, falló)",
          "El Platform Team es técnico; el Enabling Team es de procesos",
          "El Platform Team es permanente; el Enabling Team dura solo un sprint"
        ],
        correct:1,
        explanation:"Platform Team = servicio continuo (CI/CD, observabilidad, infraestructura) que otros equipos consumen. Permanente, con SLA. Enabling Team = coaching temporal para que los Stream-Aligned Teams adquieran capacidades. Su éxito se mide por poder retirarse. Un Enabling Team que nunca puede irse significa que los equipos no están aprendiendo."
      },
      {
        q:"¿Qué es la 'carga cognitiva' de un equipo y por qué es el concepto central de Team Topologies?",
        opts:[
          "La cantidad de reuniones y ceremonias que tiene el equipo por semana",
          "La complejidad total que un equipo debe entender y gestionar para hacer su trabajo — cuando excede el límite del equipo, la velocidad cae, los errores aumentan y las personas se agotan",
          "El número de historias de usuario que el equipo puede completar por sprint",
          "El nivel de dificultad técnica del código que el equipo mantiene"
        ],

        explanation:"La carga cognitiva es la complejidad total que el equipo debe mantener en 'memoria': cuántos sistemas, tecnologías, clientes, procesos y responsabilidades manejan simultáneamente. Cuando excede el límite humano del equipo (que es finito), la velocidad cae, los errores aumentan y el burnout aparece. El diseño organizacional es básicamente gestión de carga cognitiva a nivel de sistema."
      }
    ]

  // ══════════ MODELO OPERATIVO ══════════

  {
    id:"modelo-operativo", group:"operativo", title:"¿Qué es un Modelo Operativo?", icon:"⚙️",
    color:"#0D9488", light:"#CCFBF1", border:"#5EEAD4", text:"#134E4A",
    functional:`Un modelo operativo es el sistema completo que define CÓMO una organización crea y entrega valor. No es un organigrama (eso es la estructura) ni un proceso (eso es una parte). Es la intersección de estructura, procesos, personas, tecnología y gobernanza — cómo todo eso se conecta para producir resultados.

¿POR QUÉ LO NECESITA UN AGILE COACH?
Las organizaciones contratan Agile Coaches para "hacer Scrum" o "hacer SAFe". Pero Scrum y SAFe son herramientas — el modelo operativo es el sistema en el que esas herramientas operan. Si el modelo operativo está mal diseñado, los mejores frameworks del mundo no van a producir resultados.

LOS 5 COMPONENTES de un Modelo Operativo Ágil:

1. ESTRUCTURA: cómo están organizados los equipos (Team Topologies, Spotify Model, SAFe)
2. GOBERNANZA: cómo se toman las decisiones, quién tiene autoridad sobre qué
3. FLUJO DE VALOR: cómo fluye el trabajo desde la idea hasta el cliente
4. PROCESOS Y PRÁCTICAS: las ceremonias, artefactos y estándares que guían el trabajo
5. CULTURA Y LIDERAZGO: los comportamientos que el sistema incentiva o penaliza

EL ERROR MÁS COMÚN:
Organizaciones que solo cambian el componente 4 (procesos) sin tocar los otros 4. El resultado es "Agile con nombres Scrum" pero con el mismo modelo operativo waterfall debajo.

PARA ENTREVISTAS EN NTT DATA:
Cuando te pregunten sobre tu experiencia liderando transformaciones, describí en qué componentes del modelo operativo interveniste — no solo qué ceremonias implementaste.`,
    technical:`EL MODELO OPERATIVO CANVAS — 8 dimensiones para diagnosticar:

1. PURPOSE (Propósito): ¿Por qué existe el equipo/organización? ¿Qué problema resuelve para el cliente?

2. CUSTOMERS (Clientes): ¿Quiénes son los clientes internos y externos? ¿Cómo se obtiene feedback de ellos?

3. VALUE PROPOSITION (Propuesta de valor): ¿Qué valor único entrega este equipo que ningún otro puede entregar?

4. CAPABILITIES (Capacidades): ¿Qué habilidades, procesos y tecnologías necesita el equipo para entregar su propuesta de valor?

5. STRUCTURE (Estructura): ¿Cómo están organizadas las personas? ¿Quién depende de quién?

6. GOVERNANCE (Gobernanza): ¿Cómo se toman las decisiones? ¿Qué es centralizado y qué es autónomo?

7. METRICS (Métricas): ¿Cómo sabe el equipo que está haciendo un buen trabajo? ¿Qué miden y qué no?

8. CULTURE (Cultura): ¿Qué comportamientos se incentivan? ¿Qué se penaliza implícitamente?

SEÑALES DE UN MODELO OPERATIVO ROTO:
→ Los equipos entregan "features" pero los clientes no perciben valor
→ Las métricas miden actividad (velocity, puntos) pero no resultados de negocio
→ Los líderes dicen que quieren agilidad pero microgestión en la práctica
→ Las decisiones escalan a management porque los equipos no tienen autoridad para decidir
→ La gobernanza penaliza la experimentación y el aprendizaje de errores

CONEXIÓN CON TU AIDE FRAMEWORK:

    functional:`La gobernanza ágil define QUIÉN decide QUÉ, CUÁNDO y CON QUÉ información. Es uno de los componentes más ignorados en las transformaciones ágiles — y uno de los que más impactan el día a día de los equipos.

EL PROBLEMA DE LA GOBERNANZA TRADICIONAL EN ENTORNOS ÁGILES:
Las organizaciones tradicionales tienen gobernanza centralizada: todo sube al manager antes de ejecutarse. Esto destruye la agilidad porque las decisiones son más lentas que el trabajo. Los equipos se bloquean esperando aprobaciones, pierden contexto y se desmotivan.

EL PRINCIPIO CLAVE — DECIDE DONDE ESTÁ EL CONOCIMIENTO:
Las mejores decisiones se toman donde está la información y el contexto. En entornos ágiles, el conocimiento técnico y de cliente está en el equipo — no en el management. La gobernanza ágil descentraliza las decisiones al nivel donde el conocimiento existe.

3 TIPOS DE DECISIONES (modelo de descentralización):

DECISIONES DEL EQUIPO (daily/sprint):
Cómo implementar técnicamente una historia, estimaciones, orden del backlog dentro del sprint, pair programming. El equipo decide sin consultar. Velocidad: horas.

DECISIONES DEL PROGRAMA (PI/mensual):
Priorización de features entre productos, dependencias entre equipos, architecture guidelines, adopción de nuevas tecnologías. Product Management + System Architect + RTE/Tribe Lead. Velocidad: días.

DECISIONES ESTRATÉGICAS (portfolio/trimestral):
Qué Value Streams financiar, qué épicas priorizar, cómo reorganizar equipos, alianzas tecnológicas. Portfolio Leadership. Velocidad: semanas.

EL ERROR: mezclar los 3 niveles. El CEO opinando sobre la implementación técnica, o el equipo decidiendo el portfolio de inversiones.`,
    technical:`MARCOS DE TOMA DE DECISIONES para equipos ágiles:

MARCO CYNEFIN (Dave Snowden):
Un framework para diagnosticar la naturaleza del problema antes de elegir cómo decidir:
→ OBVIO: causa-efecto clara, todos lo ven. Decisión: seguir el proceso establecido.
→ COMPLICADO: causa-efecto existe pero requiere expertise. Decisión: analizar, consultar expertos, aplicar práctica probada.
→ COMPLEJO: causa-efecto solo se ve en retrospectiva. Decisión: hacer experimentos controlados, amplificar lo que funciona.
→ CAÓTICO: no hay causa-efecto perceptible. Decisión: actuar primero para estabilizar, analizar después.

La mayoría del trabajo de software es COMPLEJO — por eso los experimentos (sprints, prototipos, MVPs) son más efectivos que el análisis upfront.

DELEGATION POKER (Management 3.0):
7 niveles de delegación para explicitar quién tiene autoridad sobre cada decisión:
1. Tell — yo decido y te digo
2. Sell — yo decido y te explico por qué
3. Consult — consulto tu opinión antes de decidir
4. Agree — decidimos juntos
5. Advise — vos decidís, yo opino si querés
6. Inquire — vos decidís, me informás después
7. Delegate — vos decidís, ni me informás

PARA TU ROL COMO TRIBE LEAD:
Mapear qué decisiones están en qué nivel para cada tipo de trabajo. Los equipos deben saber claramente qué pueden decidir solos (nivel 7), qué consultan (nivel 3) y qué requiere aprobación (nivel 1-2).

DECISION LOG como artefacto:
Documentar las decisiones arquitectónicas y de proceso importantes con: contexto, opciones consideradas, decisión tomada, razones, consecuencias. Reduce la deuda de conocimiento y acelera el onboarding.`,

    functional:`El Value Stream Mapping (VSM) es la herramienta más poderosa para diagnosticar el modelo operativo de delivery. Permite visualizar cómo fluye el trabajo desde la idea hasta el cliente, identificar desperdicio (waste) y diseñar el estado futuro.

¿QUÉ ES UN VALUE STREAM?
Una value stream es la secuencia completa de actividades necesarias para llevar una idea de negocio hasta las manos de un cliente. Incluye todo: desde cuando alguien concibe la idea hasta que el usuario final puede usarla.

¿QUÉ REVELAEL VSM?
→ Process Time (PT): tiempo que algo está siendo procesado activamente
→ Wait Time (WT): tiempo que algo espera en una cola sin ser procesado
→ % Complete & Accurate (%C&A): qué % del trabajo que llega a cada paso está completo y correcto

LA REGLA DEL 80/20 DEL DESPERICIO:
En la mayoría de los flujos de desarrollo de software, el 80–90% del Lead Time total es tiempo de espera (Wait Time), no tiempo de trabajo activo. Una feature que tarda 30 días en producción probablemente tiene 3–4 días de trabajo activo y 26–27 días esperando en colas.

LOS 8 TIPOS DE WASTE (Lean adaptado a software):
1. Defectos: bugs, retrabajo
2. Sobreproducción: features que nadie usa
3. Espera: trabajo bloqueado en colas
4. No utilizar el talento: personas no empoderadas para decidir
5. Transporte: handoffs innecesarios entre equipos
6. Inventario: trabajo iniciado pero no terminado (WIP alto)
7. Movimiento: cambio de contexto, multitasking
8. Procesamiento innecesario: burocracia, documentación que nadie lee`,
    technical:`CÓMO HACER UN VALUE STREAM MAPPING:

PASO 1 — ELEGIR EL VALUE STREAM:
Seleccionar el flujo end-to-end de una capacidad de negocio representativa. Por ejemplo: "desde que un Product Owner escribe una historia hasta que el usuario puede verla en producción."

PASO 2 — MAPEAR EL ESTADO ACTUAL:
Para cada paso del flujo, documentar:
→ ¿Qué equipo/persona lo ejecuta?
→ Process Time (horas/días de trabajo activo)
→ Wait Time (horas/días de espera antes de que alguien lo tome)
→ % Complete & Accurate (¿llega bien o llega con gaps?)
→ Número de personas involucradas

PASO 3 — CALCULAR EL EFFICIENCY RATE:
Efficiency Rate = Suma de Process Times / Lead Time Total × 100
Un rate < 20% es común en organizaciones tradicionales.
Un rate > 40% indica un flujo muy optimizado.

PASO 4 — IDENTIFICAR KAIZENS:
Señalar con rayos ⚡ o explosiones 💥 los puntos de mayor desperdicio o fricción — estos son los "Kaizen bursts" donde se enfocan las mejoras.

PASO 5 — DISEÑAR EL ESTADO FUTURO:
¿Cómo se vería el flujo si elimináramos el mayor desperdicio? No es perfectible de una vez — se elige 1–3 mejoras concretas y se planifica cómo implementarlas.

MÉTRICAS DEL FLUJO (Flow Metrics):
→ Lead Time: tiempo total desde que el trabajo entra hasta que sale (incluye esperas)
→ Cycle Time: tiempo desde que alguien comienza a trabajar activamente en un ítem
→ Throughput: número de ítems completados por unidad de tiempo
→ WIP (Work in Progress): número de ítems en proceso simultáneamente

LEY DE LITTLE (fundamental):
Lead Time = WIP / Throughput
Para reducir el Lead Time, podés aumentar el Throughput O reducir el WIP. Reducir el WIP suele ser más fácil y efectivo a corto plazo.`,

    id:"okrs", group:"metricas", title:"OKRs — Objectives & Key Results", icon:"🎯",
    color:"#2563EB", light:"#DBEAFE", border:"#93C5FD", text:"#1D4ED8",
    functional:`Los OKRs son el framework de gestión de objetivos más adoptado en organizaciones ágiles. Desarrollados en Intel por Andy Grove y popularizados por Google, conectan la ambición estratégica con la ejecución cotidiana.

LA ESTRUCTURA:
→ OBJECTIVE (O): ¿A dónde queremos ir? Cualitativo, inspirador, memorable, con tiempo definido.
→ KEY RESULTS (KR): ¿Cómo sabremos que llegamos? Cuantitativos, medibles, verificables. Típicamente 3–5 por Objective.

LA DISTINCIÓN MÁS CRÍTICA — OUTPUT vs OUTCOME:
OUTPUT: lo que producís (features entregadas, historias completadas, deploys realizados).
OUTCOME: el cambio en el comportamiento o situación del usuario/negocio como resultado de lo que produjiste.

OKR MAL FORMULADO (output):
O: Entregar el módulo de pagos internacionales
KR1: Completar 40 historias de usuario
KR2: Hacer 3 deploys al mes
KR3: Tener 0 bugs en producción

OKR BIEN FORMULADO (outcome):
O: Que los clientes puedan pagar desde cualquier país sin fricción
KR1: 25% de las transacciones nuevas provienen de usuarios fuera de Perú
KR2: La tasa de abandono en checkout cae del 34% al 15%
KR3: NPS del flujo de pago sube de 42 a 65

¿POR QUÉ IMPORTA LA DISTINCIÓN?
Los outputs solo te dicen si el equipo trabajó. Los outcomes te dicen si el trabajo importó. Un equipo puede entregar 100% de sus features y tener impacto cero si las features no cambian el comportamiento del usuario.`,
    technical:`NIVELES DE OKRs EN UNA ORGANIZACIÓN ÁGIL:

NIVEL EMPRESA (anual + trimestral):
OKRs que definen la dirección estratégica. Los aprueba el C-Level. Ejemplo: "Convertirnos en la plataforma de pagos más confiable de LATAM."

NIVEL TRIBU/ART (trimestral, alineados al PI):
OKRs de la Tribe/ART que contribuyen directamente a los OKRs de empresa. Definidos en el PI Planning o QBR. Ejemplo: "Reducir la fricción del checkout para usuarios nuevos en Perú."

NIVEL EQUIPO/SQUAD (por sprint o PI):
OKRs del equipo que contribuyen al nivel Tribe. Pueden ser semanales o por iteración.

REGLAS DE ORO para OKRs bien escritos:

OBJECTIVES:
→ Debe inspirar acción — si leerlo no genera energía, reformularlo
→ Debe ser alcanzable en el período (generalmente trimestral)
→ Debe ser cualitativo — "convertirnos en..." no "aumentar en 20%..."
→ Máximo 3–5 Objectives por nivel

KEY RESULTS:
→ Deben ser medibles con un número — si no tiene número, no es un KR
→ Deben medir outcomes, no outputs — evitar "completar X features"
→ Deben ser ambiciosos: si el equipo está 100% seguro de alcanzarlos, son demasiado fáciles
→ Google apunta a un 70% de achievement como "éxito" en OKRs

ANTI-PATRONES frecuentes:
→ KRs que son tareas: "hacer la presentación de roadmap" no es un KR
→ KRs binarios (sí/no): pierden la gradualidad de progreso
→ Demasiados OKRs: más de 5 Objectives hace que todo sea prioridad (= nada lo es)
→ OKRs de equipo sin conexión con los de la empresa: los equipos optimizan localmente

CONEXIÓN CON TU EXPERIENCIA:
Como Tribe Lead en Lilab, acompañaste a PMs, POs y jefaturas en definición y seguimiento de OKRs. La distinción output vs outcome es exactamente el gap que te identificamos en el diagnóstico inicial — y es la pregunta más frecuente en entrevistas senior.`,

  {
    id:"dora-metricas", group:"metricas", title:"DORA Metrics y DevOps", icon:"📊",
    color:"#2563EB", light:"#DBEAFE", border:"#93C5FD", text:"#1D4ED8",
    functional:`Las DORA Metrics (DevOps Research and Assessment) son las 4 métricas más validadas científicamente para medir la performance de delivery de software. Desarrolladas por el equipo de investigación de Google Cloud, respaldadas por 7+ años de datos de miles de organizaciones.

¿POR QUÉ DORA Y NO VELOCITY O PUNTOS?
La velocity mide cuánto trabajo hace el equipo, no qué tan bien lo hace. DORA mide la capacidad del sistema de entrega para responder a los cambios con calidad y velocidad. Es la diferencia entre medir actividad y medir performance real.

LAS 4 MÉTRICAS DORA:

DEPLOYMENT FREQUENCY (DF):
¿Con qué frecuencia despliega el equipo a producción?
→ Elite: múltiples veces al día
→ High: entre una vez al día y una vez por semana
→ Medium: entre una vez a la semana y una vez al mes
→ Low: menos de una vez al mes

LEAD TIME FOR CHANGES (LTFC):
Tiempo desde que el código es commiteado hasta que está en producción.
→ Elite: menos de 1 hora
→ High: entre 1 día y 1 semana
→ Medium: entre 1 semana y 1 mes
→ Low: más de 6 meses

CHANGE FAILURE RATE (CFR):
% de deploys que causan incidentes o requieren hotfix.
→ Elite: 0–15%
→ High: 16–30%
→ Medium/Low: más de 30%

TIME TO RESTORE SERVICE (TTRS):
Tiempo para recuperar el servicio después de un incidente.
→ Elite: menos de 1 hora
→ High: menos de 1 día
→ Medium: entre 1 día y 1 semana
→ Low: más de 6 meses`,
    technical:`LA QUINTA MÉTRICA — Reliability (agregada en 2021):
La investigación DORA agregó Reliability como quinta dimensión: ¿el sistema cumple con los SLOs (Service Level Objectives) definidos? No es una métrica única sino un objetivo a definir por cada organización.

CÓMO MEJORAR CADA MÉTRICA:

DEPLOYMENT FREQUENCY baja → indicadores:
→ Deploy manual, burocrático o con muchos pasos
→ Branches de larga duración (feature branches de semanas)
→ Falta de CI/CD pipeline
Mejoras: automatizar el pipeline, trunk-based development, feature flags.

LEAD TIME FOR CHANGES alto → indicadores:
→ Code review tarda días
→ QA manual bloqueante
→ Aprobaciones manuales antes del deploy

    functional:`Las Flow Metrics son las métricas más relevantes para un Agile Coach o SM porque se pueden medir sin acceso al pipeline técnico — solo necesitás los datos del tablero Kanban o Jira. Miden la salud del flujo de trabajo del equipo.

¿POR QUÉ USAR FLOW METRICS EN LUGAR DE VELOCITY?

VELOCITY: mide puntos completados por sprint. Problema: los puntos son relativos a cada equipo, no comparables entre equipos, y pueden inflarse. Útil para planificación interna, inútil para diagnóstico de flujo.

FLOW METRICS: miden el tiempo y el ritmo del trabajo real — independientemente del tamaño estimado.

LAS 4 FLOW METRICS FUNDAMENTALES:

LEAD TIME (LT):
Tiempo total desde que un ítem entra al sistema (backlog committed/to do) hasta que sale (done/producción).
Incluye todo el tiempo de espera. Es lo que el cliente percibe.
"Cuánto tarda desde que pedís algo hasta que está listo."

CYCLE TIME (CT):
Tiempo desde que alguien comienza a trabajar activamente en un ítem hasta que termina.
NO incluye el tiempo de espera en backlog.
"Cuánto tarda el equipo en completar algo una vez que empieza a trabajarlo."

THROUGHPUT (TH):
Número de ítems completados por unidad de tiempo (por sprint, por semana).
Métrica de capacidad real del equipo.

WIP (Work In Progress):
Número de ítems en proceso simultáneamente.
La palanca más inmediata para mejorar el Lead Time.`,
    technical:`EL CUMULATIVE FLOW DIAGRAM (CFD):

El CFD es el diagrama más poderoso para diagnosticar el flujo de un equipo de forma visual. Muestra la cantidad acumulada de ítems en cada estado del tablero a lo largo del tiempo.

CÓMO LEERLO:
→ Eje X: tiempo (días/semanas)
→ Eje Y: número acumulado de ítems
→ Bandas de colores: cada estado del tablero (To Do, In Progress, Code Review, Testing, Done)
→ Ancho de cada banda: cuánto trabajo hay en ese estado en ese momento (WIP de ese estado)

PATRONES A DIAGNOSTICAR EN UN CFD:

FLUJO SALUDABLE:
Las bandas fluyen suavemente, son aproximadamente paralelas, y el ancho de cada banda es constante. El equipo tiene un ritmo regular.

CUELLO DE BOTELLA:
Una banda se ensancha mientras las que están "aguas arriba" se adelgazan y las que están "aguas abajo" se quedan sin trabajo. El estado que se ensancha es el cuello de botella.

WORK STOPPAGE:
Las líneas se aplanan horizontalmente — el equipo dejó de completar trabajo (vacaciones, bloqueo masivo, deuda técnica acumulada).

ACUMULACIÓN EN BACKLOG:
La banda de "To Do" crece más rápido de lo que se consume — se está aceptando trabajo más rápido de lo que el equipo puede procesarlo (demand > throughput).

CÓMO CALCULAR LT Y CT DESDE EL CFD:
Lead Time = distancia horizontal entre cuando un ítem entra a "To Do" y cuando sale de "Done"
Cycle Time = distancia horizontal entre cuando entra a "In Progress" y cuando sale de "Done"

PERCENTILES en lugar de promedios:
Nunca uses el promedio para Lead Time — los outliers lo distorsionan. Usa percentiles:
→ P50 (mediana): la mitad de los ítems se completan en este tiempo o menos
→ P85: el 85% de los ítems se completan en este tiempo
→ P95: casi todos los ítems se completan en este tiempo
El P85 es el más usado para compromisos con clientes/stakeholders.`,

    functional:`La retrospectiva es el corazón de la mejora continua en equipos ágiles. Es el evento donde el equipo reflexiona sobre cómo trabajó para trabajar mejor en el próximo ciclo. Pero la mayoría de las retrospectivas no producen mejoras reales.

¿POR QUÉ FALLAN LAS RETROSPECTIVAS?
La causa más común: el equipo identifica los mismos problemas en cada retro durante meses y nada cambia. Esto destruye la confianza en el proceso y eventualmente nadie se prepara ni participa genuinamente.

LAS 3 CONDICIONES PARA UNA RETRO EFECTIVA:

1. SEGURIDAD PSICOLÓGICA:
Las personas deben poder decir lo que realmente piensan sin temor a consecuencias negativas. Sin seguridad psicológica, la retro produce respuestas diplomáticas, no insights reales. La seguridad se construye con acciones del SM/Facilitador y del equipo.

2. FOCO EN SISTEMAS, NO EN PERSONAS:
Las retros que degeneran en culpa individual son destructivas. El objetivo es mejorar el SISTEMA (procesos, herramientas, estructura, prácticas) — las personas son parte del sistema, no el problema.

3. ACCIÓN CON ACCOUNTABILITY:
Cada retro debe producir 1–3 acciones concretas con owner individual y fecha de seguimiento. Si produce 10 acciones, ninguna se va a implementar. Si produce 0, fue una conversación interesante sin impacto.

EL CICLO COMPLETO:
Abrir → Recolectar datos → Generar insights → Decidir acciones → Cerrar
Y al comienzo de la siguiente retro: revisar las acciones de la anterior — si no se implementaron, el problema es de accountability, no de ideas.`,
    technical:`FORMATOS DE RETROSPECTIVA — más allá del "bien/mal/mejor":

1. ESTRELLA DE MAR (Starfish):
5 categorías: Keep doing · Add more of · Stop doing · Less of · Start doing
Más granular que el clásico — fuerza al equipo a distinguir entre "más de lo mismo bueno" y "cosas nuevas a probar".

2. 4L's:
Liked · Learned · Lacked · Longed for
Útil cuando el equipo tiene dificultad para separar emoción de observación.

3. TIMELINE RETRO:
Se reconstruye cronológicamente el sprint en el eje del tiempo. Cada persona agrega momentos positivos (verde) y negativos (rojo). Revelador para ver patrones (¿siempre al final del sprint hay rojo?) y sincronizar la percepción del equipo.

4. FUTUROSPECTIVE (retrospectiva del futuro):
"Imaginen que es el final del próximo trimestre y fue un éxito total. ¿Qué hicieron diferente?" Invierte el pensamiento — más energizante que identificar problemas, especialmente para equipos con baja moral.

5. SAILBOAT:
Anclas (lo que nos frena) · Viento (lo que nos impulsa) · Arrecifes (riesgos) · Sol (el objetivo)
Buena para equipos visuales y para conversaciones más estratégicas.

MÉTRICAS DE RETRO SALUDABLE:
→ % de acciones del sprint anterior que se completaron (objetivo: 100%)
→ Número de temas únicos (no repetidos del sprint anterior)
→ Participación: ¿hablan todos o solo los mismos 2–3?
→ Score de seguridad psicológica (encuesta anónima de 1–5)

SEÑALES DE ALARMA EN UNA RETRO:
→ Siempre los mismos 2–3 problemas sin resolución
→ El SM habla más que el equipo
→ Las acciones no tienen owner ni fecha
→ Alguien dice "eso es un problema de management, nosotros no podemos cambiarlo" y el facilitador no lo cuestiona
→ Silencio después de cada pregunta`,

    functional:`El 5 Whys es la técnica más simple y poderosa de análisis de causa raíz. Desarrollada en Toyota como parte del Toyota Production System, es el método que usan los Problem-Solving Workshops de SAFe y las retrospectivas más maduras.

LA PREMISA:
Los problemas visibles son síntomas, no causas. Si fixes el síntoma sin encontrar la causa raíz, el problema vuelve. La causa raíz suele estar 3–5 niveles de profundidad debajo del síntoma inicial.

CÓMO FUNCIONA:
1. Articular el problema claramente: describir el síntoma observable, con datos.
2. Preguntar "¿Por qué?" para cada respuesta, hasta 5 veces (puede ser más o menos).
3. Identificar el "pourquoi raíz" — cuando la respuesta revela algo sistémico que el equipo puede cambiar.
4. Diseñar una acción que ataque la causa raíz, no el síntoma.

EJEMPLO PRÁCTICO:
Síntoma: "Los releases tienen muchos bugs en producción."
¿Por qué? → "Porque los bugs llegan a producción sin ser detectados."
¿Por qué? → "Porque los tests automáticos no cubren los casos de edge."
¿Por qué? → "Porque no hay tiempo para escribir tests en los sprints."
¿Por qué? → "Porque la Definition of Done no incluye tests automáticos."
¿Por qué? → "Porque nadie definió un estándar de calidad para el equipo."

CAUSA RAÍZ: ausencia de Definition of Done con criterios de calidad.
SOLUCIÓN: facilitar una sesión para definir la DoD con el equipo, incluirla en el próximo sprint.

NO ES MAGIA — ES UN MÉTODO:
El 5 Whys no garantiza encontrar LA única causa raíz. Los sistemas complejos tienen múltiples causas. Pero obliga al equipo a ir más profundo que el síntoma superficial.`,
    technical:`CUÁNDO USAR CADA HERRAMIENTA DE CAUSA RAÍZ:

5 WHYS: para problemas con una cadena de causa-efecto relativamente lineal. Rápido, conversacional, se puede hacer en 15 minutos. Ideal para retrospectivas y Problem-Solving Workshops.

FISHBONE (Ishikawa Diagram): para problemas con múltiples causas potenciales de distintas categorías. El diagrama tiene la cabeza del "pez" = el problema, y las espinas = categorías de causas (People, Process, Technology, Environment, Materials, Measurement). Útil cuando el equipo tiene hipótesis de causas muy diferentes.

AMBAS COMBINADAS: primero Fishbone para mapear categorías de causas, luego 5 Whys para profundizar en las más probables. Esta es la combinación que usa el Problem-Solving Workshop del Inspect & Adapt de SAFe.

PASOS PARA UN FISHBONE EFECTIVO:
1. Escribir el problema en la "cabeza" del pez
2. Definir las categorías de espinas (para software: People, Process, Technology, Communication, Environment)
3. Brainstorm de causas posibles en cada categoría (5–10 minutos)
4. Votar las causas más probables (dot voting)
5. Aplicar 5 Whys a las 2–3 causas con más votos

ERRORES COMUNES EN EL 5 WHYS:
→ Parar en el primer "por qué" (eso es el síntoma, no la causa)
→ Derivar hacia culpa de persona: "¿Por qué? Porque Juan no hizo bien su trabajo." El 5 Whys debe siempre apuntar al sistema, no a personas.
→ El mismo "por qué" para todos los problemas: cuando el equipo siempre llega a "falta de tiempo", probablemente no fueron suficientemente profundos.
→ Detenerse cuando la respuesta "molesta" a alguien del equipo o a management.`,

    functional:`La gestión y escalamiento de impedimentos es una de las responsabilidades más críticas del SM/Agile Coach — y una de las más mal ejecutadas. Un impedimento no escalado a tiempo destruye el momentum del equipo y puede bloquear un sprint o PI completo.

¿QUÉ ES UN IMPEDIMENTO vs UN OBSTÁCULO?
OBSTÁCULO: algo que el equipo puede resolver por sí mismo con el tiempo o recursos disponibles. No requiere escalamiento — el SM ayuda al equipo a resolverlo.
IMPEDIMENTO: algo que está fuera de la capacidad del equipo de resolver por sí mismo, que requiere acción de alguien externo al equipo (management, otro equipo, proveedor).

EL ERROR MÁS COMÚN:
SMs que "capturan" impedimentos en el tablero de Jira/retro pero no los escalan activamente. Los impedimentos envejecen sin resolución, el equipo pierde fe en el proceso ágil, y el SM pierde credibilidad.

EL PRINCIPIO DE ESCALAMIENTO RÁPIDO:
Un impedimento que no puede resolverse en 24–48 horas debe escalar. Cada día adicional de bloqueo tiene un costo: el equipo no puede avanzar, la capacidad se pierde, y el problema suele ser más caro de resolver cuanto más espera.

3 NIVELES DE ESCALAMIENTO:
1. EQUIPO: el SM facilita la resolución. Si no puede en 24–48h → escalar.
2. PROGRAMA/TRIBE: el Tribe Lead/RTE actúa. Si no puede en 3–5 días → escalar.
3. PORTFOLIO/ORGANIZACIÓN: el Portfolio Leadership decide. Urgente.

PARA LA ENTREVISTA:
Cuando te pregunten "¿cómo gestionás impedimentos?", describí el proceso completo: identificación, clasificación (obstáculo vs impedimento), acción de resolución del equipo, escalamiento con tiempo explícito y contexto, y seguimiento hasta cierre.`,
    technical:`SISTEMA DE GESTIÓN DE IMPEDIMENTOS — cómo implementarlo:

PASO 1 — IDENTIFICACIÓN:
Crear un canal visible de impedimentos (físico en el board ágil o digital en Jira/Confluence/ClickUp). Cualquier persona del equipo puede agregar un impedimento. Formato mínimo: descripción del problema + quién lo reporta + desde cuándo + impacto en el sprint.

PASO 2 — CLASIFICACIÓN (en el Daily o asíncrono):
→ ¿El equipo puede resolverlo solo? → Obstáculo → acción del equipo en <48h
→ ¿Requiere acción externa? → Impedimento real → SM toma ownership de escalarlo

PASO 3 — ESCALAMIENTO CON CONTEXTO:
No escalar "tenemos un problema". Escalar con: contexto del problema + impacto cuantificado ("está bloqueando la feature X, el sprint pierde 3 días de capacidad") + opciones posibles + qué decisión o acción se necesita de quién. El escalamiento efectivo hace fácil la decisión del manager.

PASO 4 — SLA DE RESPUESTA:
Nivel equipo: 24–48h. Nivel programa: 3–5 días. Si no hay respuesta en el SLA, re-escalar a nivel superior.

PASO 5 — SEGUIMIENTO Y CIERRE:
Cada impedimento tiene un owner (siempre el SM hasta que haya un owner externo que lo tome). El SM hace follow-up activo — no espera que la solución llegue sola.

EL IMPEDIMENT BURNDOWN:
Gráfico que muestra la cantidad de impedimentos abiertos vs cerrados a lo largo del tiempo. Un SM efectivo debería mostrar una tendencia descendente o estable, nunca creciente. Si el backlog de impedimentos crece sprint a sprint, el SM no está escalando o el sistema tiene demasiados blockers estructurales.

IMPEDIMENTOS SISTÉMICOS vs PUNTUALES:
Si el mismo tipo de impedimento aparece en múltiples sprints o múltiples equipos, ya no es un impedimento puntual — es un defecto del modelo operativo. Esos deben llegar al Problem-Solving Workshop del I&A o al nivel de Portfolio.`,

    functional:`El Team Health es la medición del estado del equipo como sistema social y de delivery. Un equipo puede tener buenas métricas de flujo y aun así estar en un estado frágil o insostenible. El Team Health hace visible lo que las métricas técnicas no miden.

¿POR QUÉ MEDIR TEAM HEALTH?
Los equipos de alto rendimiento son el resultado de un entorno saludable, no solo de buenas prácticas técnicas. El burnout, la desmotivación, la falta de propósito y la desconfianza destruyen la performance mucho más rápido que la deuda técnica.

LOS MODELOS MÁS USADOS:

SPOTIFY HEALTH CHECK MODEL:
11 dimensiones medidas por el equipo en 3 colores (verde/amarillo/rojo):
→ Easy to release · Suitable process · Tech quality · Value · Speed · Mission · Fun · Learning · Support · Pawns or players · Teamwork

TEAM RADAR (customizable):
El equipo define 6–8 dimensiones propias (que reflejan su contexto) y se auto-evalúa periódicamente (cada PI o trimestre). Comparar radarás en el tiempo muestra la evolución.

NIKO-NIKO CALENDAR:
Cada persona marca diariamente cómo se sintió (😊😐😔). Revelador para ver patrones (¿siempre triste los viernes antes del release?) y para identificar quién puede estar en riesgo de burnout.

LA CONEXIÓN CON TUS OKRs:
El "30% de empleados más motivados" que SAFe reporta como resultado no es magia — es consecuencia de: autonomía real sobre cómo trabajar, propósito claro (saben para qué sirve lo que hacen), maestría (están aprendiendo y creciendo). Estos son los 3 pilares de motivación intrínseca de Daniel Pink (Autonomy, Mastery, Purpose).`,
    technical:`CÓMO FACILITAR UN TEAM HEALTH CHECK EFECTIVO:

PASO 1 — DISEÑAR LAS DIMENSIONES:
Usar el modelo Spotify o crear dimensiones propias con el equipo. 8–12 dimensiones es el rango óptimo. Menos = demasiado superficial. Más = fatiga y dilución.

PASO 2 — VOTACIÓN ANÓNIMA:
Cada persona vota de forma independiente (antes de revelar el resultado colectivo). Usar herramientas como Mentimeter, Mural, FunRetro, o post-its físicos.

PASO 3 — CALIBRACIÓN COLECTIVA:
Mostrar los resultados y discutir las divergencias. ¿Dos personas marcaron "verde" en Technical Quality y otras dos marcaron "rojo"? Esa divergencia es el dato más valioso — significa que tienen percepciones muy diferentes de la misma realidad.

PASO 4 — SELECCIONAR 1–2 DIMENSIONES:
No intentar mejorar todo. Elegir la dimensión roja más impactante y definir una acción concreta para mejorarla en el próximo ciclo.

PASO 5 — SEGUIMIENTO Y TENDENCIAS:
Guardar los resultados históricos. La tendencia importa más que el snapshot. Un equipo que mejoró de 40% verde a 70% verde en 2 trimestres está en mejor posición que uno estancado en 80% verde.

MADUREZ ÁGIL — modelos para diagnosticar:

MODELO DE 5 NIVELES (simplificado):
Nivel 1 — Iniciando: ceremonias básicas, sin métricas, alta dependencia del SM
Nivel 2 — Desarrollando: ceremonias consistentes, primeras métricas, equipo empieza a auto-organizarse
Nivel 3 — Definido: prácticas establecidas, métricas de flujo activas, equipo resuelve la mayoría de sus impedimentos
Nivel 4 — Gestionado cuantitativamente: decisiones basadas en datos, predictibilidad alta, carga cognitiva gestionada
Nivel 5 — Optimizando: mejora continua sistémica, el equipo experimenta y aprende activamente

Para la entrevista en NTT DATA: podés describir la madurez actual de tus squads en Lilab usando este modelo y qué acciones tomaste para evolucionar de nivel 2 a nivel 3 o 4.`,

          return(<div key={i} style={{display:"flex",gap:8,marginBottom:4}}><div style={{minWidth:10,height:10,borderRadius:"50%",background:colors[i],marginTop:3}}></div><div style={{fontSize:10,color:"#e2e8f0"}}><strong style={{color:colors[i]}}>{x.n}:</strong> {x.s}</div></div>);
        })}
      </div>
    </div>
  );
}

// ══════════════════════════ QUIZ ══════════════════════════

function Quiz({ questions, color, light, onComplete }) {
  const [answers, setAnswers] = useState({});
  const [submitted, setSubmitted] = useState(false);
  function answer(qi, oi) { if (submitted || answers[qi] !== undefined) return; setAnswers(a => ({...a, [qi]: oi})); }
  function submit() {
    if (Object.keys(answers).length < questions.length) return;
    const score = questions.reduce((s, q, i) => s + (answers[i] === q.correct ? 1 : 0), 0);
    setSubmitted(true); onComplete(score);
  }
  return (
    <div>
      {questions.map((q, qi) => (
        <div key={qi} style={{marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:500,color:"#1e293b",marginBottom:8,lineHeight:1.5}}>{qi+1}. {q.q}</div>
          <div style={{display:"flex",flexDirection:"column",gap:5}}>
            {q.opts.map((o, oi) => {
              let bg="#f8fafc", border="1px solid #e2e8f0", tc="#374151";
              if (answers[qi]===oi)     { bg=light; border=`1px solid ${color}`; tc="#1e293b"; }
              if (submitted && oi===q.correct) { bg="#f0fdf4"; border="1px solid #86efac"; tc="#14532d"; }
              if (submitted && answers[qi]===oi && oi!==q.correct) { bg="#fef2f2"; border="1px solid #fca5a5"; tc="#7f1d1d"; }
              return (
                <div key={oi} onClick={() => answer(qi, oi)}
                  style={{padding:"9px 13px",borderRadius:7,border,background:bg,cursor:submitted||answers[qi]!==undefined?"default":"pointer",fontSize:12,color:tc,transition:".15s",lineHeight:1.4}}>
                  {o}
                </div>
              );
            })}
          </div>
          {submitted && (
            <div style={{marginTop:8,padding:"8px 12px",background:answers[qi]===q.correct?"#f0fdf4":"#fef2f2",border:`1px solid ${answers[qi]===q.correct?"#86efac":"#fca5a5"}`,borderRadius:6,fontSize:12,color:answers[qi]===q.correct?"#14532d":"#7f1d1d",lineHeight:1.6}}>
              {answers[qi]===q.correct?"✓ ":"✗ "}{q.explanation}
            </div>
          )}
        </div>
      ))}
      {!submitted && (
        <button onClick={submit} disabled={Object.keys(answers).length < questions.length}
          style={{marginTop:4,padding:"9px 20px",borderRadius:7,border:"none",background:Object.keys(answers).length<questions.length?"#e2e8f0":color,color:Object.keys(answers).length<questions.length?"#94a3b8":"#fff",fontSize:13,fontWeight:600,cursor:Object.keys(answers).length<questions.length?"not-allowed":"pointer"}}>
          Verificar respuestas
        </button>
      )}
    </div>
  );
}

// ══════════════════════════ APP ══════════════════════════

function ModelosGuia() {
  const [chapter, setChapter] = useState(0);
  const [tab, setTab] = useState("functional");
  const [quizDone, setQuizDone] = useState({});
  const [totalScore, setTotalScore] = useState(0);
  const [totalQ, setTotalQ] = useState(0);
  const [quizKey, setQuizKey] = useState(0);

  const ch = CHAPTERS[chapter];
  const pct = totalQ > 0 ? Math.round((totalScore / totalQ) * 100) : 0;
  const doneCh = Object.keys(quizDone).length;
  const totalChapters = CHAPTERS.length;
  const totalQuestions = CHAPTERS.reduce((s, c) => s + c.questions.length, 0);

  function handleQuizComplete(score) {
    const prev = quizDone[chapter];
    if (!prev) { setTotalScore(s => s + score); setTotalQ(t => t + ch.questions.length); }
    setQuizDone(d => ({...d, [chapter]: {done:true, score, total:ch.questions.length}}));
  }
  function goChapter(idx) { setChapter(idx); setTab("functional"); setQuizKey(k => k+1); }

  return (
    <div style={{fontFamily:"var(--font-sans)", maxWidth:780, margin:"0 auto"}}>

      {/* TOP BAR */}
      <div style={{background:"#0f172a", borderRadius:"12px 12px 0 0", padding:"12px 16px", display:"flex", alignItems:"center", gap:10}}>
        <div style={{width:32,height:32,borderRadius:8,background:"rgba(13,148,136,.25)",border:"1px solid rgba(94,234,212,.4)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:16}}>🏛️</div>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:500,color:"#f1f5f9"}}>Modelos Organizacionales y Métricas · Guía interactiva</div>
          <div style={{fontSize:11,color:"#64748b"}}>{totalChapters} secciones · {totalQuestions} preguntas · Diseño Org · Modelo Op · Métricas · Mejora Continua</div>
        </div>
        {doneCh > 0 && (
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:18,fontWeight:700,color:pct>=80?"#4ade80":pct>=60?"#fbbf24":"#f87171"}}>{pct}%</div>
            <div style={{fontSize:10,color:"#64748b"}}>{doneCh}/{totalChapters} secciones</div>
          </div>
        )}
      </div>

      {/* GROUP + CHAPTER NAV */}
      <div style={{background:"#1e293b", padding:"8px 12px", borderBottom:"1px solid #0f172a"}}>
        {GROUPS.map(group => {
          const gc = CHAPTERS.filter(c => c.group === group.id);
          return (
            <div key={group.id} style={{marginBottom:6}}>
              <div style={{fontSize:10,fontWeight:700,color:group.color,letterSpacing:".05em",marginBottom:4,paddingLeft:2}}>
                {group.label.toUpperCase()}
              </div>
              <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                {gc.map(c => {
                  const idx = CHAPTERS.indexOf(c);
                  return (
                    <button key={idx} onClick={() => goChapter(idx)}
                      style={{fontSize:11,padding:"5px 10px",borderRadius:6,cursor:"pointer",background:chapter===idx?c.color:"transparent",color:chapter===idx?"#fff":"#94a3b8",border:`1px solid ${chapter===idx?c.color:"#334155"}`,fontWeight:chapter===idx?600:400,display:"flex",alignItems:"center",gap:4,transition:".15s"}}>
                      {quizDone[idx] && <span style={{fontSize:9}}>{quizDone[idx].score===quizDone[idx].total?"✓":"~"}</span>}
                      {c.icon} {c.title}
                    </button>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>

      {/* MAIN */}
      <div style={{background:"#fff", border:"1px solid #e2e8f0", borderTop:"none"}}>

        {/* Chapter header */}
        <div style={{background:ch.light, borderBottom:`2px solid ${ch.border}`, padding:"14px 18px"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
            <div style={{width:42,height:42,borderRadius:10,background:ch.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{ch.icon}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:15,fontWeight:700,color:ch.text}}>{ch.title}</div>
              <div style={{fontSize:11,color:ch.color,marginTop:2}}>
                {ch.questions.length} preguntas
                {quizDone[chapter] && ` · ${quizDone[chapter].score}/${quizDone[chapter].total} correctas`}
              </div>
            </div>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              {tabs.map(t => (
                <button key={t.id} onClick={() => setTab(t.id)}
                  style={{fontSize:11,padding:"5px 12px",borderRadius:6,cursor:"pointer",background:tab===t.id?ch.color:"transparent",color:tab===t.id?"#fff":ch.text,border:`1px solid ${tab===t.id?ch.color:ch.border}`,fontWeight:tab===t.id?600:400,transition:".15s"}}>
                  {t.label}
                </button>
              ))}
            </div>
          </div>
        </div>

        {/* Tab content */}
        <div style={{padding:"16px 18px"}}>

          {tab === "functional" && (
            <div>
              <div style={{fontSize:10,fontWeight:700,color:"#94a3b8",letterSpacing:".5px",marginBottom:10}}>¿QUÉ ES Y POR QUÉ IMPORTA?</div>
              <div style={{fontSize:13,color:"#374151",lineHeight:1.85,whiteSpace:"pre-line"}}>{ch.functional}</div>
              <div style={{marginTop:14,padding:"10px 14px",background:ch.light,border:`1px solid ${ch.border}`,borderRadius:8,fontSize:12,color:ch.text}}>
                Orden recomendado: <strong>Funcional → Técnico → Visual → ¿Lo entendí?</strong>
              </div>
            </div>
          )}

          {tab === "technical" && (
            <div>
              <div style={{fontSize:10,fontWeight:700,color:"#94a3b8",letterSpacing:".5px",marginBottom:10}}>CÓMO SE IMPLEMENTA — DETALLES</div>
              <div style={{background:"#0f172a",borderRadius:8,padding:"14px 16px"}}>
                <div style={{fontSize:12,color:"#e2e8f0",lineHeight:1.9,whiteSpace:"pre-line",fontFamily:"monospace"}}>{ch.technical}</div>
              </div>
            </div>
          )}

          {tab === "visual" && (
            <div>
              <div style={{fontSize:10,fontWeight:700,color:"#94a3b8",letterSpacing:".5px",marginBottom:10}}>DIAGRAMA / ESTRUCTURA VISUAL</div>
              <Visual chapter={ch} />
              <div style={{fontSize:12,color:"#64748b",marginTop:10,lineHeight:1.6}}>
                Mapa mental para la entrevista — estudiá la estructura antes del quiz.
              </div>
            </div>
          )}

          {tab === "quiz" && (
            <div>
              <div style={{fontSize:10,fontWeight:700,color:"#94a3b8",letterSpacing:".5px",marginBottom:12}}>VALIDA TU COMPRENSIÓN</div>
              {quizDone[chapter] ? (
                <div>
                  <div style={{background:quizDone[chapter].score===quizDone[chapter].total?"#f0fdf4":"#fffbeb",border:`1px solid ${quizDone[chapter].score===quizDone[chapter].total?"#86efac":"#fcd34d"}`,borderRadius:8,padding:"12px 14px",marginBottom:12}}>
                    <div style={{fontSize:13,fontWeight:600,color:"#1e293b"}}>{quizDone[chapter].score===quizDone[chapter].total?"🎯 ¡Sección dominada!":"✅ Sección completada"}</div>
                    <div style={{fontSize:12,color:"#64748b",marginTop:4}}>{quizDone[chapter].score}/{quizDone[chapter].total} correctas</div>
                  </div>
                  <button onClick={() => { setQuizDone(d => { const nd={...d}; delete nd[chapter]; return nd; }); setQuizKey(k=>k+1); }}
                    style={{fontSize:12,padding:"8px 16px",borderRadius:7,border:"1px solid #e2e8f0",background:"#f8fafc",cursor:"pointer",color:"#64748b"}}>
                    Repetir quiz
                  </button>
                </div>
              ) : (
                <Quiz key={quizKey} questions={ch.questions} color={ch.color} light={ch.light} onComplete={handleQuizComplete} />
              )}
            </div>
          )}
        </div>

        {/* Navigation */}
        <div style={{padding:"10px 18px 14px",borderTop:"1px solid #f1f5f9",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <button onClick={() => goChapter(chapter-1)} disabled={chapter===0}
            style={{fontSize:12,padding:"8px 16px",borderRadius:7,border:"1px solid #e2e8f0",background:"#f8fafc",cursor:chapter===0?"not-allowed":"pointer",color:chapter===0?"#cbd5e1":"#374151"}}>
            ← Anterior
          </button>
          <div style={{fontSize:11,color:"#94a3b8"}}>{chapter+1} / {totalChapters}</div>
          <button onClick={() => goChapter(chapter+1)} disabled={chapter===totalChapters-1}
            style={{fontSize:12,padding:"8px 16px",borderRadius:7,border:`1px solid ${ch.color}`,background:ch.color,color:"#fff",cursor:chapter===totalChapters-1?"not-allowed":"pointer",opacity:chapter===totalChapters-1?.5:1}}>
            Siguiente →
          </button>
        </div>
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<ModelosGuia />);
</script>

<script>
// Hide loading, show content when React renders
window.addEventListener('load', () => {
  setTimeout(() => {
    const root = document.getElementById('root');
    const loading = document.getElementById('loading');
    if (root && root.children.length > 0) {
      loading.style.display = 'none';
      root.style.display = 'block';
    } else {
      const observer = new MutationObserver(() => {
        if (root.children.length > 0) {
          loading.style.display = 'none';
          root.style.display = 'block';
          observer.disconnect();
        }
      });
      observer.observe(root, { childList: true });
    }
  }, 100);
});

// Register SW
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
