    functional: `LeSS (Large-Scale Scrum) es un framework de escalamiento ágil que aplica los principios de Scrum a múltiples equipos trabajando en el mismo producto. La idea central es radical: en lugar de agregar procesos y roles para coordinar equipos, LeSS los elimina.

Sin LeSS: organizaciones grandes tienden a crear capas de coordinación — Project Managers, Coordinadores, Scrum of Scrums formales, Release Managers — que agregan burocracia sin agregar valor.

Con LeSS: múltiples equipos comparten un único Product Backlog, un único Product Owner y un único producto. La coordinación ocurre directamente entre equipos — no a través de intermediarios. LeSS confía en que los equipos maduros pueden coordinarse solos.

Diferencia clave con SAFe: SAFe agrega estructura y prescripción para escalar. LeSS reduce estructura y confía en los principios de Scrum.`,

    technical: `Dos variantes según el tamaño:

LeSS (básico) — hasta 8 equipos:
• 1 Product Owner único para todos los equipos
• 1 Product Backlog compartido
• 1 Sprint sincronizado para todos los equipos
• 1 Sprint Review integrada
• 1 Retrospectiva general + retrospectivas por equipo
• Múltiples Daily Scrums coordinados entre equipos

LeSS Huge — más de 8 equipos:
• Introduce Requirement Areas (áreas de requerimientos)
• Cada área tiene un Area Product Owner
• El Product Owner principal coordina los Area POs
• Escala hasta cientos de equipos

Roles en LeSS:
→ Product Owner: gestiona el Product Backlog único. Trabaja directamente con todos los equipos.
→ Scrum Master: puede facilitar 1–3 equipos. Rol de coaching organizacional, no solo de equipo.
→ NO existe: Project Manager, Release Manager, Chief SM, coordinadores intermedios.`,

    functional: `LeSS mantiene los eventos de Scrum pero los adapta para múltiples equipos. La clave es que todos los equipos trabajan en el mismo Sprint sincronizado — no en ciclos independientes.

Sprint Planning en LeSS tiene dos partes:
Parte 1: todos los equipos juntos con el PO para entender las prioridades del Product Backlog compartido y seleccionar ítems.
Parte 2: cada equipo por separado para planificar cómo va a entregar sus ítems seleccionados.

Sprint Review en LeSS es un evento integrado donde todos los equipos muestran su trabajo juntos — no demos por separado. Stakeholders pueden moverse entre áreas y ver el producto completo.

Retrospectiva tiene dos niveles: primero cada equipo hace su retrospectiva interna, luego hay una retrospectiva general del sistema ("Overall Retrospective") donde representantes de todos los equipos identifican impedimentos organizacionales.`,

    technical: `Mecanismos de coordinación entre equipos en LeSS:

Multi-Team Sprint Planning Part 1:
Todos los equipos juntos seleccionan ítems del Product Backlog. Los equipos negocian directamente qué toma cada uno. Sin intermediarios.

Component Communities / CoPs:
Equipos con expertise similar se coordinan en comunidades de práctica. No son roles formales — son coordinación voluntaria.

Traveler (Viajero):
Un desarrollador que visita temporalmente otro equipo para transferir conocimiento o resolver una dependencia específica. Mecanismo lightweight de coordinación técnica.

Overall Retrospective:
Participan: Scrum Masters, Product Owner, managers, representantes de equipos. Objetivo: identificar y resolver impedimentos del sistema — no del equipo individual.

Sprint Review bazaar-style:

  // ─────────────────────────────── TDD ───────────────────────────────
  {
    id: "tdd-intro",
    title: "¿Qué es TDD?",
    icon: "🔴",
    color: "#DC2626",

    text: "#7F1D1D",
    group: "TDD",

    functional: `TDD (Test-Driven Development) es una práctica de desarrollo donde escribís el test ANTES de escribir el código. El ciclo es contraintuitivo pero poderoso: primero el test falla (rojo), luego escribís el mínimo código para que pase (verde), luego mejorás el código sin cambiar el comportamiento (refactor).

Sin TDD: el código crece sin cobertura de tests. Los desarrolladores prueban manualmente, los bugs llegan a producción, refactorizar es arriesgado porque "algo puede romperse", y el diseño del código tiende a ser complejo porque no fue pensado para ser testeable.

Con TDD: cada comportamiento tiene un test que lo documenta. El código es más simple porque el diseño está guiado por lo que necesita el test. Refactorizar es seguro porque los tests detectan regresiones. Los bugs se encuentran en segundos, no en producción.

Como SM: tu rol no es implementar TDD — es crear las condiciones para que el equipo lo adopte. Eso significa entender qué es, cuándo aplica y cómo facilitar la conversación cuando el equipo dice "no tenemos tiempo para tests".`,

    technical: `El ciclo Red-Green-Refactor:

RED: escribís un test que describe el comportamiento esperado. El test falla porque el código no existe aún. Esto confirma que el test está bien escrito y que el comportamiento no estaba implementado.

GREEN: escribís el mínimo código posible para que el test pase. No importa si es "feo" — solo que el test pase. No anticipés funcionalidad que no está siendo testeada ahora.

REFACTOR: con el test en verde, mejorás el código — eliminas duplicación, mejorás nombres, aplicás patrones — sin cambiar el comportamiento. Si algo se rompe, los tests te lo dicen inmediatamente.

Tipos de tests en TDD:
→ Unit tests: prueban una función o clase aislada. Rápidos (milisegundos). El 70-80% de la cobertura.
→ Integration tests: prueban la interacción entre componentes. Más lentos.
→ E2E tests: prueban el flujo completo. Los más lentos y frágiles.

Test coverage no es el objetivo — es una consecuencia. El objetivo es diseño guiado por comportamiento.`,

        explanation: "TDD invierte el orden tradicional: primero el test (que falla — Red), luego el código mínimo para que pase (Green), luego la mejora del código (Refactor). El test escrito antes actúa como especificación del comportamiento."

      },

          "Mejorar la estructura del código sin cambiar su comportamiento, con los tests como red de seguridad",
          "Eliminar los tests que ya no son necesarios"
        ],
        correct: 2,
        explanation: "Refactor = mejorar el diseño del código (eliminar duplicación, mejorar nombres, aplicar patrones) sin cambiar el comportamiento. Los tests en verde son la red de seguridad que te dice si algo se rompe durante la mejora."

  {
    id: "tdd-sm",
    title: "TDD: rol del SM",
    icon: "🛠️",

    functional: `Como SM, tu trabajo con TDD no es hacer pair programming ni revisar tests. Es crear las condiciones organizacionales y culturales para que TDD sea posible.

El principal obstáculo de TDD no es técnico — es cultural. Los equipos tienen presión de velocidad, el negocio pide features rápido, y los tests "se sienten" como trabajo adicional que no entrega valor directo. Tu rol es hacer visible el costo de no tener tests.

Las tres conversaciones que tenés que poder facilitar:
1. Con el equipo: ¿cuánto tiempo pasamos arreglando bugs que podrían haberse detectado antes?
2. Con el PO: ¿cuánto vale para el negocio que podamos refactorizar sin miedo a romper producción?
3. Con management: ¿cuál es el costo de la deuda técnica acumulada sin cobertura de tests?

TDD es parte de la Definition of Done cuando el equipo lo adopta. Eso es algo que facilitás — no imponés.`,

    technical: `Cómo integrar TDD en el proceso como SM:

En la Definition of Done:
Agregar "unit tests escritos y pasando" y "cobertura mínima del 80% para código nuevo" como criterios de Done. Esto hace que TDD sea parte del flujo, no una actividad opcional.

En el refinamiento:
Facilitar que el equipo discuta qué comportamientos van a testear por cada historia. Las historias con criterios de aceptación claros son más fáciles de testear — conectá TDD con buenas prácticas de escritura de historias.

En la retrospectiva:
Medir el ratio de bugs encontrados en desarrollo vs en producción. Si la mayoría aparecen en producción, es una señal de falta de cobertura. Usá el dato para facilitar la conversación, no para acusar.

En los impedimentos:
Si el equipo no puede adoptar TDD porque el código legacy no es testeable, ese es un impedimento técnico real. Escalalo, priorizá Enablers técnicos para refactorizar el legacy, asigná tiempo en el Sprint para trabajo de infraestructura de tests.`,

      },

        q: "El equipo no puede escribir tests porque el código legacy no tiene interfaces testeables. ¿Cómo lo manejás como SM?",
        opts: [

      },
      {

  // ─────────────────────────────── BDD ───────────────────────────────
  {
    id: "bdd-intro",
    title: "¿Qué es BDD?",
    icon: "🟢",
    color: "#16A34A",

    group: "BDD",

    functional: `BDD (Behavior-Driven Development) extiende TDD hacia el negocio. En lugar de escribir tests técnicos que solo entienden los developers, BDD define el comportamiento del sistema en lenguaje que pueden leer negocio, QA y desarrollo juntos.

Sin BDD: los criterios de aceptación son ambiguos ("el sistema debe funcionar correctamente"), los developers asumen comportamientos que el negocio no esperaba, y los bugs de "funcionamiento incorrecto" son frecuentes — no porque el código esté mal, sino porque se entendió mal el requerimiento.

Con BDD: el comportamiento se define antes de escribir una línea de código, usando el formato Given-When-Then que cualquier stakeholder puede entender y validar. El test de aceptación automatizado ES la especificación — no hay brecha entre lo documentado y lo que se testea.

Como SM: BDD es directamente relevante para tu rol. Facilitás el refinamiento donde se escriben los criterios de aceptación — si esos criterios tienen formato Given-When-Then, ya tenés la base de BDD.`,

    technical: `El formato Given-When-Then (Gherkin):

GIVEN (Dado que): el estado inicial del sistema o el contexto previo a la acción.
WHEN (Cuando): la acción o evento que ocurre.
THEN (Entonces): el resultado esperado verificable.

Ejemplo concreto:
Feature: Login de usuario
  Scenario: Login exitoso con credenciales válidas
    Given que el usuario "luis@mail.com" existe en el sistema
    And su contraseña es "12345"
    When ingresa sus credenciales en el formulario de login
    Then es redirigido al dashboard
    And ve el mensaje "Bienvenido, Luis"

Herramientas BDD populares:
→ Cucumber (Java, Ruby, JS): el más popular. Parsea archivos .feature en Gherkin.
→ SpecFlow (.NET): Cucumber para el ecosistema Microsoft.
→ Behave (Python): implementación Python de BDD.
→ Pytest-BDD (Python): integración BDD con pytest.

El archivo .feature es legible por el negocio. El step definition es el código que implementa cada paso.`,

    visual: { type: "bdd-flow" },

    questions: [
      {
        q: "¿Cuál es la diferencia principal entre TDD y BDD?",

        explanation: "TDD guía el diseño técnico del código con tests unitarios. BDD define el comportamiento del sistema en lenguaje compartido (Given-When-Then) que negocio, QA y dev pueden leer y validar juntos. BDD opera a nivel de comportamiento de negocio; TDD a nivel de unidad técnica."
      },
      {
        q: "¿Qué parte del proceso ágil ya estás haciendo que se conecta directamente con BDD?",
        opts: [
          "El Daily Scrum donde el equipo sincroniza",
          "La Sprint Review donde se muestra el producto",
          "El refinamiento donde se escriben los criterios de aceptación de las historias",
          "La retrospectiva donde se mejoran los procesos"
        ],
        correct: 2,
        explanation: "Los criterios de aceptación de una historia de usuario en formato Given-When-Then son la base de BDD. Si ya facilitás refinamientos donde se definen ACs claros, ya estás haciendo el primer paso de BDD. El siguiente es automatizar esos ACs como tests ejecutables."
      },

        q: "Un desarrollador te dice que los archivos .feature de Gherkin 'son para el negocio pero nadie del negocio los lee'. ¿Qué respondés?",
        opts: [

          "El valor está en que negocio y técnicos los escriben juntos en el refinamiento, antes de codificar — no en que los lean después",

        explanation: "El mayor valor de BDD no es el archivo .feature como documentación — es la conversación que genera al escribirlo. Negocio y técnicos alineando qué significa 'funcionar correctamente' ANTES de codificar evita los malentendidos más costosos."

  {
    id: "bdd-sm",
    title: "BDD: rol del SM",
    icon: "🤝",
    color: "#16A34A",
    light: "#DCFCE7",
    border: "#86EFAC",
    text: "#14532D",
    group: "BDD",

    functional: `Como SM, BDD conecta directamente con tu trabajo de facilitar el refinamiento y mejorar la calidad de los criterios de aceptación. No necesitás saber Cucumber — necesitás entender qué problema resuelve y cómo facilitarlo.

El problema que BDD resuelve para vos: la brecha entre lo que el negocio pide, lo que el developer entiende y lo que QA testea. Cuando esas tres perspectivas están desalineadas, el bug llega a producción aunque "el código funcione bien".

Three Amigos (Los Tres Amigos) es la práctica BDD que más directamente podés facilitar como SM. Es una conversación entre:
→ Product Owner / Negocio: ¿qué necesitamos que el sistema haga?
→ Developer: ¿cómo lo voy a implementar?
→ QA / Tester: ¿cómo voy a verificar que está bien?

Esta conversación ocurre ANTES de que el developer empiece a codificar — idealmente en el refinamiento. Tu rol es facilitar que los tres roles estén en la sala (o en la llamada) y que la conversación produzca criterios de aceptación claros y testeables.`,

Paso 2 — Introducir Three Amigos:
Antes de que el developer empiece una historia, agendá una sesión corta (30 min) con PO + Dev + QA para alinear el comportamiento esperado. Facilitá la sesión vos.

Paso 3 — Definition of Ready con ACs testeables:
Agregá a la DoR: "los criterios de aceptación tienen formato Given-When-Then y fueron revisados por QA". Esto hace que BDD sea parte del flujo, no una actividad adicional.

Paso 4 — Automatización (responsabilidad del equipo técnico):

function Quiz({ questions, color, light, onComplete }) {
  const [answers, setAnswers] = useState({});
  const [submitted, setSubmitted] = useState(false);

  function answer(qi, oi) {
    if (submitted || answers[qi] !== undefined) return;
    setAnswers(a => ({ ...a, [qi]: oi }));
  }

  function submit() {
    if (Object.keys(answers).length < questions.length) return;
    const score = questions.reduce((s, q, i) => s + (answers[i] === q.correct ? 1 : 0), 0);
    setSubmitted(true);
    onComplete(score);
  }

  return (
    <div>
      {questions.map((q, qi) => (
        <div key={qi} style={{ marginBottom: 16 }}>
          <div style={{ fontSize: 13, fontWeight: 500, color: "#1e293b", marginBottom: 8, lineHeight: 1.5 }}>{qi + 1}. {q.q}</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
            {q.opts.map((o, oi) => {
              let bg = "#f8fafc", border = "#e2e8f0", textColor = "#374151";
              if (answers[qi] === oi) { bg = light; border = color; textColor = "#1e293b"; }
              if (submitted && oi === q.correct) { bg = "#f0fdf4"; border = "#86efac"; textColor = "#14532d"; }
              if (submitted && answers[qi] === oi && oi !== q.correct) { bg = "#fef2f2"; border = "#fca5a5"; textColor = "#7f1d1d"; }
              return (
                <div key={oi} onClick={() => answer(qi, oi)} style={{ padding: "9px 13px", borderRadius: 7, border: `1px solid ${border}`, background: bg, cursor: submitted || answers[qi] !== undefined ? "default" : "pointer", fontSize: 12, color: textColor, transition: ".15s", lineHeight: 1.4 }}>
                  {o}
                </div>
              );
            })}
          </div>
          {submitted && (
            <div style={{ marginTop: 8, padding: "8px 12px", background: answers[qi] === q.correct ? "#f0fdf4" : "#fef2f2", border: `1px solid ${answers[qi] === q.correct ? "#86efac" : "#fca5a5"}`, borderRadius: 6, fontSize: 12, color: answers[qi] === q.correct ? "#14532d" : "#7f1d1d", lineHeight: 1.6 }}>
              {answers[qi] === q.correct ? "✓ " : "✗ "}{q.explanation}
            </div>
          )}
        </div>
      ))}
      {!submitted && (
        <button onClick={submit} disabled={Object.keys(answers).length < questions.length} style={{ marginTop: 4, padding: "9px 20px", borderRadius: 7, border: "none", background: Object.keys(answers).length < questions.length ? "#e2e8f0" : color, color: Object.keys(answers).length < questions.length ? "#94a3b8" : "#fff", fontSize: 13, fontWeight: 600, cursor: Object.keys(answers).length < questions.length ? "not-allowed" : "pointer" }}>
          Verificar respuestas
        </button>
      )}
    </div>
  );
}

          {tab === "quiz" && (
            <div>
              <div style={{ fontSize: 10, fontWeight: 700, color: "#94a3b8", letterSpacing: ".5px", marginBottom: 12 }}>VALIDA TU COMPRENSIÓN</div>
              {quizDone[chapter] ? (
                <div>
                  <div style={{ background: quizDone[chapter].score === quizDone[chapter].total ? "#f0fdf4" : "#fffbeb", border: `1px solid ${quizDone[chapter].score === quizDone[chapter].total ? "#86efac" : "#fcd34d"}`, borderRadius: 8, padding: "12px 14px", marginBottom: 12 }}>
                    <div style={{ fontSize: 13, fontWeight: 600, color: "#1e293b" }}>{quizDone[chapter].score === quizDone[chapter].total ? "🎯 ¡Sección dominada!" : "✅ Sección completada"}</div>
                    <div style={{ fontSize: 12, color: "#64748b", marginTop: 4 }}>{quizDone[chapter].score}/{quizDone[chapter].total} correctas</div>
                  </div>
                  <button onClick={() => { setQuizDone(d => { const nd = { ...d }; delete nd[chapter]; return nd; }); setQuizKey(k => k + 1); }} style={{ fontSize: 12, padding: "8px 16px", borderRadius: 7, border: "1px solid #e2e8f0", background: "#f8fafc", cursor: "pointer", color: "#64748b" }}>
                    Repetir quiz
                  </button>
                </div>
              ) : (
                <Quiz key={quizKey} questions={ch.questions} color={ch.color} light={ch.light} onComplete={handleQuizComplete} />
              )}
            </div>
          )}
        </div>

        {/* Nav */}
        <div style={{ padding: "10px 18px 14px", borderTop: "1px solid #f1f5f9", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <button onClick={() => goChapter(chapter - 1)} disabled={chapter === 0} style={{ fontSize: 12, padding: "8px 16px", borderRadius: 7, border: "1px solid #e2e8f0", background: "#f8fafc", cursor: chapter === 0 ? "not-allowed" : "pointer", color: chapter === 0 ? "#cbd5e1" : "#374151" }}>
            ← Anterior
          </button>
          <div style={{ fontSize: 11, color: "#94a3b8" }}>{chapter + 1} / {CHAPTERS.length}</div>
          <button onClick={() => goChapter(chapter + 1)} disabled={chapter === CHAPTERS.length - 1} style={{ fontSize: 12, padding: "8px 16px", borderRadius: 7, border: `1px solid ${ch.color}`, background: ch.color, color: "#fff", cursor: chapter === CHAPTERS.length - 1 ? "not-allowed" : "pointer", opacity: chapter === CHAPTERS.length - 1 ? .5 : 1 }}>
            Siguiente →
          </button>
        </div>
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<LeSSTDDBDDGuia />);
</script>

<script>
// Hide loading, show content when React renders
window.addEventListener('load', () => {
  setTimeout(() => {
    const root = document.getElementById('root');
    const loading = document.getElementById('loading');
    if (root && root.children.length > 0) {
      loading.style.display = 'none';
      root.style.display = 'block';
    } else {
      const observer = new MutationObserver(() => {
        if (root.children.length > 0) {
          loading.style.display = 'none';
          root.style.display = 'block';
          observer.disconnect();
        }
      });
      observer.observe(root, { childList: true });
    }
  }, 100);
});

// Register SW
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
</html>
