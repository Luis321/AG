    functional:`CALARIS es un sistema de ejecución estratégica que convierte caos organizacional en valor medible. No es un framework teórico — es un sistema operativo práctico para Agile Coaches, Delivery Leaders y AI-Enabled Strategists que operan en entornos complejos.

¿POR QUÉ EXISTE CALARIS?
Los frameworks ágiles (Scrum, SAFe, Kanban) resuelven el CÓMO entregar. CALARIS resuelve el QUÉ, POR QUÉ y PARA QUIÉN entregar — antes de que empiece cualquier ejecución.

Sin CALARIS: aplicás frameworks sin diagnóstico, los OKRs son decorativos, el roadmap es una lista de features sin dirección estratégica, y el equipo trabaja duro en las cosas equivocadas.

Con CALARIS: cada decisión parte del contexto real, la ejecución está alineada con el valor del negocio, el liderazgo influye sin autoridad formal, y el impacto es medible.

LAS 7 CAPAS:
C — Contexto: analizá antes de actuar
A — Alineación: asegurá dirección común
L — Liderazgo: influí sin autoridad formal
A — Audiencia: adaptá el mensaje
R — Roadmap: convertí visión en ejecución
I — Impacto: medí valor real
S — Standards: definí reglas para escalar

LA FORMA DE RAZONAR:
Siempre en ese orden. Si saltás una capa, el sistema se rompe. Un Roadmap sin Contexto es un plan ciego. Un Liderazgo sin Alineación genera fricción. Un Standards sin Impacto es burocracia.

PARA LA ENTREVISTA EN BCP/NTT DATA:
CALARIS es tu diferencial único. Nadie más en el proceso va a llegar con un framework propio. Usalo para estructurar tus respuestas — cada pregunta de la entrevista puede responderse con las 7 capas.`,
    technical:`CALARIS COMO SISTEMA OPERATIVO — cómo funciona en la práctica:

ENTRADA: un problema, una iniciativa, un conflicto, una oportunidad
PROCESO: análisis en las 7 capas en secuencia
SALIDA: decisión estructurada, acción concreta, impacto medible

CUÁNDO ACTIVAR CADA CAPA:

C — Contexto: al inicio de cualquier engagement. Antes de proponer cualquier solución.
A — Alineación: cuando hay múltiples stakeholders con agendas diferentes.
L — Liderazgo: cuando hay resistencia, conflicto o necesidad de influir sin autoridad.
A — Audiencia: antes de cualquier comunicación importante (ejecutivos, equipo, cliente).
R — Roadmap: cuando hay que convertir la estrategia en ejecución concreta.
I — Impacto: para demostrar valor, justificar inversiones, tomar decisiones con datos.

R: "¿Cómo llego de aquí hasta allá, paso a paso?"

    functional:`La capa de Contexto es la más crítica de CALARIS — y la más ignorada. El error más costoso en transformaciones ágiles es aplicar frameworks sin diagnóstico previo. CALARIS empieza aquí.

EL PRINCIPIO FUNDAMENTAL:
Analizá antes de actuar. Sin contexto, cualquier solución es una apuesta. Con contexto, cada decisión está informada.

¿QUÉ ANALIZA EL CONTEXTO?

1. MODELO DE NEGOCIO:
¿Cómo genera valor la organización? ¿Cuáles son sus flujos de ingresos? ¿Cuáles son sus restricciones regulatorias? En BCP: banco retail con millones de clientes, regulado por la SBS, con obligaciones de compliance estrictas.

2. STAKEHOLDERS REALES vs FORMALES:
El organigrama dice quién tiene el título. El contexto te dice quién tiene el poder real de decisión, quién puede bloquear, quién puede patrocinar.

3. CULTURA ORGANIZACIONAL:
¿Es una cultura jerárquica o colaborativa? ¿Se incentiva la experimentación o se penaliza el error? En banca: cultura conservadora con aversión al riesgo — el ATF debe adaptarse.

4. FLUJO DE VALOR:
¿Cómo fluye el trabajo desde la idea hasta el cliente? ¿Dónde están los cuellos de botella? ¿Cuánto tarda una feature en producción?

5. RESTRICCIONES:
Budget, tiempo, regulación, deuda técnica, capacidad del equipo, dependencias externas. Las restricciones definen el espacio de soluciones posibles.

SIN CONTEXTO vs CON CONTEXTO:
Sin: "Implementemos SAFe en BCP porque es el estándar de la industria"
Con: "BCP tiene 40 equipos, cultura conservadora, compliance estricto y legacy bancario — el modelo operativo debe ser SAFe Essential adaptado con gobernanza de compliance integrada"`,
    technical:`HERRAMIENTAS DE DIAGNÓSTICO DE CONTEXTO:

STAKEHOLDER MAP — 4 cuadrantes:
→ Alto poder, alto interés: gestionar activamente (sponsors ejecutivos)
→ Alto poder, bajo interés: mantener satisfechos (C-Level)
→ Bajo poder, alto interés: mantener informados (equipo)
→ Bajo poder, bajo interés: monitorear (áreas de soporte)

VALUE STREAM MAP rápido:
1. Identificar el flujo de una capacidad representativa (ej: nueva feature de pagos)
2. Mapear cada paso: idea → desarrollo → QA → compliance → producción
3. Medir Lead Time real y Efficiency Rate
4. Identificar los 2-3 mayores cuellos de botella

PREGUNTAS CLAVE DE CONTEXTO para BCP:
→ "¿Cuáles son las 3 iniciativas estratégicas más importantes del banco este año?"
→ "¿Cuál es el principal bloqueador para entregar valor más rápido?"
→ "¿Cómo se toman las decisiones de priorización? ¿Quién tiene la última palabra?"
→ "¿Qué pasó con las últimas transformaciones ágiles que intentaron?"
→ "¿Cuáles son los procesos de compliance que impactan el delivery del equipo?"

CALARIS + IA PARA CONTEXTO:

ANTI-PATRÓN más costoso:
Llegar a BCP el primer día con un plan de transformación ya hecho. El contexto se descubre, no se asume. Las primeras 2 semanas en un nuevo engagement deben ser 80% escucha y 20% propuesta.`,

        explanation:"Las restricciones no son el enemigo — son la realidad del sistema. En BCP: la regulación de la SBS define qué puede desplegarse y cuándo. La deuda técnica define qué puede cambiarse en cuánto tiempo. El budget define qué es viable. Diseñar sin considerar restricciones produce roadmaps hermosos que nunca se ejecutan."

  // ══════════ EJECUCIÓN ══════════

  {
    id:"alineacion", group:"ejecucion", title:"A — Alineación", icon:"🎯",
    color:"#0D9488", light:"#CCFBF1", border:"#5EEAD4", text:"#134E4A",
    functional:`La Alineación asegura que todos los actores — equipo, negocio, stakeholders — estén yendo hacia el mismo lugar con la misma comprensión de qué significa éxito.

¿POR QUÉ FALLA LA ALINEACIÓN?
La mayoría de los equipos creen que están alineados porque asisten a las mismas reuniones. Pero "alineación" real significa: misma definición de valor, mismas prioridades, mismo entendimiento de los objetivos.

LOS 3 NIVELES DE ALINEACIÓN:

1. ALINEACIÓN DE VALOR:
¿Todos saben por qué existe este equipo y qué valor entrega al negocio? En BCP: "reducir la fricción del cliente en operaciones digitales para aumentar el NPS del canal app."

2. ALINEACIÓN DE PRIORIDADES (OKRs):
¿Las prioridades del backlog reflejan los objetivos estratégicos del negocio? OKRs mal formulados = backlogs inflados con features que nadie usa.

OKR bien alineado:
O: Que el cliente complete operaciones sin ayuda humana
KR1: Tasa de abandono en app cae del 34% al 15%
KR2: Llamadas al call center por operaciones digitales reducen 40%

3. ALINEACIÓN DE EXPECTATIVAS:
¿Los stakeholders saben qué pueden esperar y cuándo? Las expectativas no alineadas producen las peores conversaciones — cuando alguien esperaba algo que el equipo nunca prometió.

SIN ALINEACIÓN vs CON ALINEACIÓN:
Sin: cada stakeholder tiene su propia agenda, el backlog crece sin control, el equipo trabaja en lo que pidió el último en hablar
Con: decisiones de priorización son rápidas porque todos tienen el mismo marco de valor, el backlog refleja la estrategia, el equipo sabe qué no hacer`,
    technical:`HERRAMIENTAS DE ALINEACIÓN:

OKR WORKSHOP — cómo facilitarlo con CALARIS:
1. Contexto primero: presentar los datos del negocio y los resultados actuales
2. Pregunta de alineación: "¿Qué cambio en el mundo/negocio/cliente queremos ver en 90 días?"
3. Formular el Objective: cualitativo, inspirador, orientado a outcome
4. Derivar los Key Results: cuantitativos, medibles, que el equipo puede influir
5. Validar la conexión: ¿este KR es consecuencia de trabajar en estas features?
6. Test de output vs outcome: si el KR se puede cumplir sin que el cliente cambie su comportamiento, es un output, no un outcome

PRIORIZACIÓN CON WSJF (Weighted Shortest Job First — SAFe):
Para cada ítem del backlog calcular:
WSJF = (Valor de negocio + Urgencia temporal + Reducción de riesgo) / Tamaño
El ítem con mayor WSJF entra primero al sprint.

SEÑALES DE DESALINEACIÓN en un equipo BCP:
→ El PO y el tech lead tienen versiones diferentes del Sprint Goal
→ El backlog tiene más de 100 ítems sin priorización clara
→ Los stakeholders piden features contradictorias en la misma semana
→ El equipo no sabe cómo su trabajo conecta con los OKRs del negocio
→ Las retros producen mejoras de proceso pero el negocio sigue insatisfecho

CALARIS + IA PARA ALINEACIÓN:
→ Usar Claude para analizar el backlog y detectar ítems sin conexión con OKRs
→ Usar ChatGPT para reformular OKRs output como OKRs outcome
→ Usar NotebookLM para procesar múltiples documentos de estrategia y encontrar contradicciones`,
    visual:{ type:"alineacion" },
    questions:[
      {
        q:"El backlog del equipo tiene 150 ítems. El PO dice que todo es prioritario. ¿Cómo aplicás la capa de Alineación?",
        opts:["Estimás las 150 historias con el equipo para planificar los próximos 6 meses","Pedís al PO que reduzca el backlog a 20 ítems antes de continuar","Facilitás un workshop de alineación: conectar el backlog con los OKRs del negocio. Todo ítem que no contribuya a ningún KR activo se mueve a un icebox. El resultado es un backlog de 20-30 ítems priorizados por valor real","Implementás WSJF para estimar el valor de cada uno de los 150 ítems"],
        correct:2,
        explanation:"Un backlog de 150 ítems 'todos prioritarios' es un síntoma de desalineación, no de un equipo productivo. La solución de CALARIS es conectar el backlog con los OKRs: si un ítem no contribuye a ningún KR activo, no es prioritario ahora. El icebox no lo elimina — lo deja disponible para cuando sea relevante."

        correct:1,

  {
    id:"liderazgo", group:"ejecucion", title:"L — Liderazgo", icon:"🧭",
    color:"#0D9488", light:"#CCFBF1", border:"#5EEAD4", text:"#134E4A",
    functional:`La capa de Liderazgo en CALARIS define cómo influir, moverse y generar cambio sin necesidad de autoridad formal. Es la capa más diferencial del framework — porque la mayoría de los Agile Coaches solo facilitan. Los mejores lideran.

LA PARADOJA DEL ATF:
Tenés responsabilidad sobre los resultados del equipo pero sin autoridad jerárquica sobre nadie. En BCP, el ATF de NTT DATA trabaja con un squad del banco — no puede ordenar, solo puede influir.

LOS 3 PILARES DEL LIDERAZGO EN CALARIS:

1. MANEJO DE STAKEHOLDERS:
No es gestión de relaciones — es gestión de influencia. ¿Quién puede patrocinar el cambio? ¿Quién puede bloquearlo? ¿Qué necesita cada stakeholder para moverse en la dirección correcta?

2. CONVERSACIONES DIFÍCILES:
El ATF que evita el conflicto no protege al equipo — lo abandona. Las conversaciones difíciles son: dar feedback a un PO que no refina el backlog, decirle a un ejecutivo que su urgencia está destruyendo el sprint, confrontar a un developer senior que bloquea el equipo.

3. TOMA DE POSTURA:
Ser un facilitador neutral no significa no tener opinión. Cuando el equipo está tomando una decisión que el ATF sabe que va a dañar el resultado, la responsabilidad profesional es decirlo. Con datos, con respeto, con firmeza.

SIN LIDERAZGO vs CON LIDERAZGO:
Sin: el ATF facilita reuniones, toma notas, y deja que el equipo decida todo — incluso cuando el equipo está yendo en la dirección equivocada
Con: el ATF influye sin autoridad, genera conversaciones incómodas cuando es necesario, construye alianzas con stakeholders clave, y toma postura basada en datos`,
    technical:`TÉCNICAS DE LIDERAZGO SIN AUTORIDAD:

CONSTRUIR CREDIBILIDAD TÉCNICA:
En BCP, un ATF de NTT DATA necesita ganarse la confianza del equipo del banco. La credibilidad se gana con: conocimiento del contexto bancario, propuestas con datos, coherencia entre lo que dice y lo que hace, y resultados visibles en las primeras semanas.

GESTIÓN DE RESISTENCIA — 4 tipos:
1. Resistencia por miedo: "no quiero que cambien mis procesos" → mostrar beneficios concretos para esa persona
2. Resistencia por experiencia: "ya intentamos esto y no funcionó" → reconocer la historia, diferencias concretas con el nuevo enfoque
3. Resistencia política: "si esto funciona, pierdo poder" → encontrar cómo el cambio los empodera en lugar de reducirlos
4. Resistencia por sobrecarga: "no tenemos tiempo para otro cambio" → reducir la fricción del cambio, empezar pequeño

CÓMO TENER UNA CONVERSACIÓN DIFÍCIL (modelo CALARIS):
1. Contexto: describir la situación con datos, sin juicio
2. Impacto: qué consecuencia tiene en el equipo/negocio/cliente
3. Pedido específico: qué necesitás que cambie

    id:"audiencia", group:"ejecucion", title:"A — Audiencia", icon:"🎙️",
    color:"#0D9488", light:"#CCFBF1", border:"#5EEAD4", text:"#134E4A",
    functional:`La capa de Audiencia en CALARIS resuelve el problema más frecuente en transformaciones ágiles: comunicar el mensaje correcto a la persona equivocada, o el mensaje incorrecto a la persona correcta.

EL PRINCIPIO FUNDAMENTAL:
No existe un mensaje universal. La misma información debe comunicarse de forma completamente diferente según quién la recibe. El ATF que habla igual al CEO que al developer está fallando a ambos.

LAS 3 AUDIENCIAS PRINCIPALES EN BCP:

1. AUDIENCIA EJECUTIVA (CEO, Gerentes, Sponsors):
Lenguaje: valor de negocio, riesgo, ROI, tiempo al mercado
Lo que quieren saber: ¿estamos entregando lo que prometimos? ¿cuál es el riesgo? ¿cuándo llega al cliente?
Lo que NO quieren: velocity points, story points, definición de done, detalles técnicos
Formato: 3 slides máximo, datos, tendencias, decisiones que necesitan tomar

2. AUDIENCIA DE NEGOCIO (PO, Product Manager, Analistas):
Lenguaje: features, valor para el usuario, prioridades, roadmap
Lo que quieren saber: ¿qué se entrega en el próximo sprint? ¿cuándo está listo X?
Formato: backlog priorizado, roadmap Now/Next/Later, demo del producto funcionando

3. AUDIENCIA TÉCNICA (Developers, QA, Arquitectos):
Lenguaje: implementación, arquitectura, deuda técnica, criterios de aceptación
Lo que quieren saber: ¿qué construir exactamente? ¿cómo se integra? ¿qué calidad se espera?
Formato: historias con criterios Given/When/Then, DoD clara, decisiones de arquitectura documentadas

SIN AUDIENCIA vs CON AUDIENCIA:
Sin: el ATF presenta el burndown chart al CEO y las métricas de negocio al developer
Con: el ATF tiene versiones del mismo mensaje para cada audiencia, adaptadas a su lenguaje, sus preguntas y sus necesidades`,
    technical:`CÓMO ADAPTAR EL MENSAJE — framework de CALARIS:

PASO 1 — IDENTIFICAR LA AUDIENCIA:
¿Quién es? ¿Qué le importa? ¿Qué decisión necesita tomar? ¿Cuánto tiempo tiene?

PASO 2 — ELEGIR EL LENGUAJE:
Ejecutivo → valor, riesgo, tiempo, dinero
Negocio → features, usuario, prioridad, fecha
Técnico → implementación, calidad, arquitectura, deuda

PASO 3 — ELEGIR EL FORMATO:
Ejecutivo → bullet points, números, tendencias (2 minutos)
Negocio → demo en vivo, roadmap visual (15 minutos)
Técnico → especificación detallada, criterios de aceptación (30 minutos)

PASO 4 — ANTICIPAR LAS PREGUNTAS:
Cada audiencia tiene sus preguntas predecibles. Preparar respuestas antes de la presentación.

EJECUTIVO DE BCP — sus preguntas predecibles:
→ "¿Cuándo va a estar listo para el cliente?"
→ "¿Cuánto nos va a costar?"
→ "¿Qué pasa si no lo hacemos?"
→ "¿Cómo sé que están avanzando bien?"

DEVELOPER DE BCP — sus preguntas predecibles:
→ "¿Cómo se integra con el sistema legado?"
→ "¿Cuáles son los criterios de aceptación exactos?"
→ "¿Quién revisa el código?"
→ "¿Hay deuda técnica que bloquea esta historia?"

CALARIS + IA PARA AUDIENCIA:
→ "Tengo este mensaje técnico sobre el Cycle Time del equipo. Reescribilo para un gerente de BCP que solo tiene 2 minutos y necesita saber si el equipo está entregando bien."
→ "Ayudame a preparar las 5 preguntas que un CTO de banco haría en una revisión trimestral de la transformación ágil."`,

  {
    id:"roadmap", group:"delivery", title:"R — Roadmap", icon:"🗺️",
    color:"#2563EB", light:"#DBEAFE", border:"#93C5FD", text:"#1D4ED8",
    functional:`La capa de Roadmap en CALARIS convierte la visión estratégica en ejecución incremental. No es un Gantt con fechas fijas — es una secuencia de valor con horizontes de certeza decreciente.

EL PRINCIPIO FUNDAMENTAL:
El roadmap no es un contrato. Es una hipótesis sobre cómo llegar al objetivo, sujeta a actualización continua basada en el aprendizaje de cada entrega.

LOS 3 TIPOS DE ROADMAP EN CALARIS:

1. ROADMAP ESTRATÉGICO (Portfolio Level):
Horizonte: 6-12 meses. Granularidad: Épicas y capacidades de negocio.
Audiencia: C-Level, Portfolio Leadership.
Formato: Now/Next/Later con outcomes esperados, no features.

2. ROADMAP DE PROGRAMA (ART/Tribe Level):
Horizonte: 2-3 PIs (4-6 meses). Granularidad: Features y habilitadores.
Audiencia: Business Owners, Product Management.
Formato: PI Planning board con dependencias mapeadas.

3. ROADMAP DEL EQUIPO (Squad Level):
Horizonte: 2-3 sprints. Granularidad: Historias de usuario.
Audiencia: PO, stakeholders directos.
Formato: Sprint backlog + próximos 2 sprints en el horizonte.

¿QUÉ HACE UN BUEN ROADMAP?
→ Comunica dirección sin comprometer fechas que no pueden garantizarse
→ Muestra dependencias entre equipos explícitamente
→ Incluye puntos de validación (¿llegamos donde esperábamos?)
→ Es actualizable sin drama — el cambio no es falla, es aprendizaje

PARA BCP:
Los ejecutivos van a pedir fechas exactas. El ATF con CALARIS entrega un roadmap con horizontes de certeza: "En las próximas 2 semanas, con alta certeza. En el próximo mes, con certeza media. En los próximos 3 meses, con baja certeza sujeta a validación."`,
    technical:`CÓMO CONSTRUIR UN ROADMAP CON CALARIS:

PASO 1 — CONTEXTO + ALINEACIÓN primero:
El roadmap solo puede construirse después de entender el contexto y alinear los OKRs. Un roadmap sin OKRs es una lista de features sin dirección.

PASO 2 — DESCOMPONER OUTCOMES EN CAPACIDADES:
Outcome → Épicas → Features → Historias
OKR: reducir abandono en checkout del 34% al 15%
  → Épica: rediseño del flujo de pago
    → Feature: pago con un clic
    → Feature: guardar método de pago preferido
      → Historia: como usuario guardo mi tarjeta con un tap

PASO 3 — SECUENCIAR POR VALOR Y DEPENDENCIAS:
¿Qué debe entregarse primero para desbloquear lo siguiente?
¿Qué depende de qué equipo externo?
¿Qué tiene más valor de negocio vs más riesgo técnico?

PASO 4 — DEFINIR PUNTOS DE VALIDACIÓN:
Al final de cada PI o cada mes: ¿estamos viendo el impacto esperado?
Si no: ¿pivotamos la dirección o ajustamos las acciones?

ROADMAP NOW / NEXT / LATER para BCP:
NOW (próximas 2-4 semanas): compromisos claros con el equipo
NEXT (próximo mes): dirección confirmada, features definidas
LATER (2-3 meses): outcomes esperados, capacidades de alto nivel

ANTI-PATRÓN — el Roadmap Waterfall disfrazado de Ágil:
Cuando el roadmap tiene fechas exactas para todo a 12 meses y no cambia nunca = es un plan de proyecto waterfall con otro nombre. El roadmap ágil abraza la incertidumbre y la gestiona con horizontes de certeza.

CALARIS + IA PARA ROADMAP:
→ "Tengo estos 3 OKRs del trimestre y estas 20 features en el backlog. Ayudame a secuenciarlas en un roadmap Now/Next/Later priorizando por valor de negocio."
→ "Identificá las dependencias entre estas features y sugerí el orden de implementación que minimice los bloqueos."`,

        opts:["Creás el roadmap con fechas exactas para los 12 meses — el gerente tiene autoridad para pedirlo","Rechazás la propuesta porque los roadmaps ágiles no tienen fechas","Proponés un roadmap con horizontes de certeza: compromisos claros para las próximas 4 semanas, dirección confirmada para el próximo mes, outcomes esperados para los próximos 3 meses. Explicás que más certeza artificial produce más decepción real","Delegás el roadmap al PO — no es responsabilidad del ATF"],

        q:"¿Cuál es la diferencia entre un Roadmap de CALARIS y un plan de proyecto tradicional?",

  {
    id:"impacto", group:"delivery", title:"I — Impacto", icon:"📊",
    color:"#2563EB", light:"#DBEAFE", border:"#93C5FD", text:"#1D4ED8",
    functional:`La capa de Impacto en CALARIS define cómo medir que el trabajo que hace el equipo realmente importa. Sin impacto medible, la agilidad es un conjunto de ceremonias sin propósito.

EL PRINCIPIO FUNDAMENTAL:
Medir valor real, no actividad. La diferencia entre un equipo que entrega y un equipo que trabaja está en las métricas que elige medir.

LOS 3 NIVELES DE IMPACTO:

1. IMPACTO DE NEGOCIO (¿el cliente/negocio cambió algo?):
→ NPS: ¿los clientes están más satisfechos?
→ Conversión: ¿más usuarios completan el flujo?
→ Retención: ¿los usuarios vuelven?
→ Revenue: ¿generamos más o perdemos menos?

2. IMPACTO DE DELIVERY (¿el equipo entrega mejor?):
→ Lead Time: tiempo desde idea hasta producción
→ Cycle Time: tiempo de trabajo activo
→ Throughput: cuántas capacidades por sprint
→ Change Failure Rate: % de deploys que generan incidentes

3. IMPACTO DE EQUIPO (¿el equipo está en buen estado?):
→ Team Health score trimestral
→ % de acciones de retro implementadas
→ Impedimentos resueltos vs abiertos
→ Engagement score

SIN IMPACTO vs CON IMPACTO:
Sin: el equipo mide velocity y puntos — sabe cuánto trabaja pero no si lo que hace importa
Con: el equipo mide outcomes de negocio + métricas de delivery + salud del equipo — toma decisiones basadas en qué mueve el valor real`,
    technical:`FRAMEWORK DE MÉTRICAS CALARIS — 4 dimensiones:

1. MÉTRICAS DE VALOR (¿estamos construyendo lo correcto?):
Adopción de features: % de usuarios que usan lo que entregamos
Feature impact: ¿cambió el comportamiento del usuario?
OKR achievement: % de Key Results alcanzados

2. MÉTRICAS DE FLUJO (¿estamos entregando bien?):
Lead Time: desde que entra al backlog hasta producción
Cycle Time: desde que el equipo empieza a trabajar hasta done
Throughput: ítems completados por semana
WIP: ítems en proceso simultáneamente

3. MÉTRICAS DE CALIDAD (¿estamos construyendo bien?):
Change Failure Rate: % de deploys con incidentes
Time to Restore: tiempo para recuperarse de un incidente
Defect Escape Rate: bugs que llegan a producción
Test Coverage: % de código cubierto por tests automáticos

4. MÉTRICAS DE EQUIPO (¿el sistema humano está sano?):
Team Health Score: evaluación periódica por dimensiones
Psychological Safety Score: encuesta anónima
Impediment Resolution Rate: tiempo promedio para resolver bloqueos

CÓMO PRESENTAR IMPACTO A EJECUTIVOS DE BCP:
No presentar Cycle Time — presentar: "Desde que acordamos trabajar en algo hasta que el cliente puede usarlo, tardamos X días. Hace 3 meses tardábamos Y días. Eso significa que llegamos al mercado X semanas antes."

CALARIS + IA PARA IMPACTO:
→ "Tengo estos datos de métricas del último trimestre. Identificá las 3 tendencias más importantes y generá un resumen ejecutivo de 200 palabras para el QBR."
→ "Ayudame a diseñar un dashboard de impacto para un squad bancario que comunique valor a 3 audiencias: CEO, PO y equipo técnico."

ANTI-PATRÓN — métricas sin contexto:
Un Cycle Time de 9 días puede ser excelente o terrible dependiendo del contexto. La capa de Impacto en CALARIS siempre compara contra un baseline y una tendencia, no contra un número abstracto.`,

  {
    id:"standards", group:"escala", title:"S — Standards", icon:"📐",
    color:"#16A34A", light:"#DCFCE7", border:"#86EFAC", text:"#14532D",
    functional:`La capa de Standards en CALARIS define las reglas que permiten escalar sin caos. Sin standards, cada equipo inventa su propio proceso — generando inconsistencia, deuda de conocimiento y dependencia de personas clave.

EL PRINCIPIO FUNDAMENTAL:
Los standards no son burocracia — son el sistema inmune de la organización. Permiten que el equipo opere con autonomía dentro de límites claros.

LOS 3 TIPOS DE STANDARDS EN CALARIS:

1. STANDARDS DE CALIDAD:
Definition of Done: qué significa que algo está terminado
Definition of Ready: qué debe cumplir una historia antes de entrar al sprint
Criterios de aceptación: formato Given/When/Then
Test coverage mínimo: % de código cubierto por tests automáticos

2. STANDARDS DE PROCESO:
Working Agreements: cómo trabajamos juntos (horarios, canales, decisiones)
Escalation Path: quién decide qué y cuándo
Meeting norms: duración máxima, agenda previa, decisiones documentadas
Branching strategy: convenciones de código y deploy

3. STANDARDS DE GOBERNANZA (incluye IA):
Decision log: registro de decisiones arquitectónicas y de proceso
Architecture Decision Records (ADRs): decisiones técnicas con contexto y razones
IA Governance: qué datos pueden procesarse con IA, qué outputs requieren revisión humana
Compliance checkpoints: qué validaciones de seguridad y regulación son mandatorias antes del deploy

SIN STANDARDS vs CON STANDARDS:
Sin: cuando un developer clave sale del equipo, el conocimiento se va con él. Cada squad en BCP tiene su propio proceso. La calidad es inconsistente.
Con: el equipo opera consistentemente independiente de quién está. El onboarding de nuevos miembros tarda días, no meses. La calidad es predecible.`,

  if(t==="calaris-overview") return <VisualCalarisOverview/>;

  if(t==="alineacion")       return <VisualAlineacion/>;
  if(t==="liderazgo")        return <VisualLiderazgo/>;
  if(t==="audiencia")        return <VisualAudiencia/>;

function Quiz({ questions, color, light, onComplete }) {
  const [answers, setAnswers] = useState({});
  const [submitted, setSubmitted] = useState(false);
  function answer(qi, oi) { if (submitted || answers[qi] !== undefined) return; setAnswers(a=>({...a,[qi]:oi})); }
  function submit() {
    if (Object.keys(answers).length < questions.length) return;
    const score = questions.reduce((s,q,i) => s+(answers[i]===q.correct?1:0), 0);
    setSubmitted(true); onComplete(score);
  }
  return (
    <div>
      {questions.map((q,qi) => (
        <div key={qi} style={{marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:500,color:"#1e293b",marginBottom:8,lineHeight:1.5}}>{qi+1}. {q.q}</div>
          <div style={{display:"flex",flexDirection:"column",gap:5}}>
            {q.opts.map((o,oi) => {
              let bg="#f8fafc", border="1px solid #e2e8f0", tc="#374151";
              if(answers[qi]===oi) { bg=light; border=`1px solid ${color}`; tc="#1e293b"; }
              if(submitted && oi===q.correct) { bg="#f0fdf4"; border="1px solid #86efac"; tc="#14532d"; }
              if(submitted && answers[qi]===oi && oi!==q.correct) { bg="#fef2f2"; border="1px solid #fca5a5"; tc="#7f1d1d"; }
              return <div key={oi} onClick={()=>answer(qi,oi)} style={{padding:"9px 13px",borderRadius:7,border,background:bg,cursor:submitted||answers[qi]!==undefined?"default":"pointer",fontSize:12,color:tc,lineHeight:1.4}}>{o}</div>;
            })}
          </div>
          {submitted && <div style={{marginTop:8,padding:"8px 12px",background:answers[qi]===q.correct?"#f0fdf4":"#fef2f2",border:`1px solid ${answers[qi]===q.correct?"#86efac":"#fca5a5"}`,borderRadius:6,fontSize:12,color:answers[qi]===q.correct?"#14532d":"#7f1d1d",lineHeight:1.6}}>{answers[qi]===q.correct?"✓ ":"✗ "}{q.explanation}</div>}
        </div>
      ))}
      {!submitted && <button onClick={submit} disabled={Object.keys(answers).length<questions.length} style={{marginTop:4,padding:"9px 20px",borderRadius:7,border:"none",background:Object.keys(answers).length<questions.length?"#e2e8f0":color,color:Object.keys(answers).length<questions.length?"#94a3b8":"#fff",fontSize:13,fontWeight:600,cursor:Object.keys(answers).length<questions.length?"not-allowed":"pointer"}}>Verificar respuestas</button>}
    </div>
  );
}

function CalarisGuia() {
  const [chapter, setChapter] = useState(0);
  const [tab, setTab] = useState("functional");
  const [quizDone, setQuizDone] = useState({});
  const [totalScore, setTotalScore] = useState(0);
  const [totalQ, setTotalQ] = useState(0);
  const [quizKey, setQuizKey] = useState(0);

  const ch = CHAPTERS[chapter];
  const pct = totalQ>0 ? Math.round((totalScore/totalQ)*100) : 0;
  const doneCh = Object.keys(quizDone).length;

  function handleQuizComplete(score) {
    if (!quizDone[chapter]) { setTotalScore(s=>s+score); setTotalQ(t=>t+ch.questions.length); }
    setQuizDone(d=>({...d,[chapter]:{done:true,score,total:ch.questions.length}}));
  }
  function goChapter(idx) { setChapter(idx); setTab("functional"); setQuizKey(k=>k+1); }

  return (
    <div style={{fontFamily:"var(--font-sans)",maxWidth:780,margin:"0 auto"}}>

      <div style={{background:"#0f172a",borderRadius:"12px 12px 0 0",padding:"12px 16px",display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:32,height:32,borderRadius:8,background:"rgba(124,58,237,.25)",border:"1px solid rgba(196,181,253,.4)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:16}}>🧩</div>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:500,color:"#f1f5f9"}}>CALARIS Framework — Guía interactiva · BCP prep</div>
          <div style={{fontSize:11,color:"#64748b"}}>{CHAPTERS.length} secciones · {CHAPTERS.reduce((s,c)=>s+c.questions.length,0)} preguntas · Tu framework diferencial</div>
        </div>
        {doneCh>0 && <div style={{textAlign:"right"}}><div style={{fontSize:18,fontWeight:700,color:pct>=80?"#4ade80":pct>=60?"#fbbf24":"#f87171"}}>{pct}%</div><div style={{fontSize:10,color:"#64748b"}}>{doneCh}/{CHAPTERS.length}</div></div>}
      </div>

      <div style={{background:"#1e293b",padding:"8px 12px",borderBottom:"1px solid #0f172a"}}>
        {GROUPS.map(group => {
          const gc = CHAPTERS.filter(c=>c.group===group.id);
          return (
            <div key={group.id} style={{marginBottom:6}}>
              <div style={{fontSize:10,fontWeight:700,color:group.color,letterSpacing:".05em",marginBottom:4,paddingLeft:2}}>{group.label.toUpperCase()}</div>
              <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                {gc.map(c => {
                  const idx = CHAPTERS.indexOf(c);
                  return <button key={idx} onClick={()=>goChapter(idx)} style={{fontSize:11,padding:"5px 10px",borderRadius:6,cursor:"pointer",background:chapter===idx?c.color:"transparent",color:chapter===idx?"#fff":"#94a3b8",border:`1px solid ${chapter===idx?c.color:"#334155"}`,fontWeight:chapter===idx?600:400,display:"flex",alignItems:"center",gap:4,transition:".15s"}}>
                    {quizDone[idx]&&<span style={{fontSize:9}}>{quizDone[idx].score===quizDone[idx].total?"✓":"~"}</span>}
                    {c.icon} {c.title}
                  </button>;
                })}
              </div>
            </div>
          );
        })}
      </div>

      <div style={{background:"#fff",border:"1px solid #e2e8f0",borderTop:"none"}}>
        <div style={{background:ch.light,borderBottom:`2px solid ${ch.border}`,padding:"14px 18px"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
            <div style={{width:42,height:42,borderRadius:10,background:ch.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{ch.icon}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:15,fontWeight:700,color:ch.text}}>{ch.title}</div>
              <div style={{fontSize:11,color:ch.color,marginTop:2}}>{ch.questions.length} preguntas{quizDone[chapter]&&` · ${quizDone[chapter].score}/${quizDone[chapter].total} correctas`}</div>
            </div>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{fontSize:11,padding:"5px 12px",borderRadius:6,cursor:"pointer",background:tab===t.id?ch.color:"transparent",color:tab===t.id?"#fff":ch.text,border:`1px solid ${tab===t.id?ch.color:ch.border}`,fontWeight:tab===t.id?600:400}}>{t.label}</button>)}
            </div>
          </div>
        </div>

        <div style={{padding:"16px 18px"}}>
          {tab==="functional"&&<div><div style={{fontSize:10,fontWeight:700,color:"#94a3b8",letterSpacing:".5px",marginBottom:10}}>¿QUÉ ES Y POR QUÉ IMPORTA?</div><div style={{fontSize:13,color:"#374151",lineHeight:1.85,whiteSpace:"pre-line"}}>{ch.functional}</div><div style={{marginTop:14,padding:"10px 14px",background:ch.light,border:`1px solid ${ch.border}`,borderRadius:8,fontSize:12,color:ch.text}}>Orden recomendado: <strong>Funcional → Técnico → Visual → ¿Lo entendí?</strong></div></div>}
          {tab==="technical"&&<div><div style={{fontSize:10,fontWeight:700,color:"#94a3b8",letterSpacing:".5px",marginBottom:10}}>IMPLEMENTACIÓN Y DETALLES</div><div style={{background:"#0f172a",borderRadius:8,padding:"14px 16px"}}><div style={{fontSize:12,color:"#e2e8f0",lineHeight:1.9,whiteSpace:"pre-line",fontFamily:"monospace"}}>{ch.technical}</div></div></div>}
          {tab==="visual"&&<div><div style={{fontSize:10,fontWeight:700,color:"#94a3b8",letterSpacing:".5px",marginBottom:10}}>REPRESENTACIÓN VISUAL</div><Visual chapter={ch}/><div style={{fontSize:12,color:"#64748b",marginTop:10}}>Mapa mental para la entrevista — memorizá antes del quiz.</div></div>}
          {tab==="quiz"&&<div><div style={{fontSize:10,fontWeight:700,color:"#94a3b8",letterSpacing:".5px",marginBottom:12}}>VALIDA TU COMPRENSIÓN</div>{quizDone[chapter]?(<div><div style={{background:quizDone[chapter].score===quizDone[chapter].total?"#f0fdf4":"#fffbeb",border:`1px solid ${quizDone[chapter].score===quizDone[chapter].total?"#86efac":"#fcd34d"}`,borderRadius:8,padding:"12px 14px",marginBottom:12}}><div style={{fontSize:13,fontWeight:600,color:"#1e293b"}}>{quizDone[chapter].score===quizDone[chapter].total?"🎯 ¡Sección dominada!":"✅ Sección completada"}</div><div style={{fontSize:12,color:"#64748b",marginTop:4}}>{quizDone[chapter].score}/{quizDone[chapter].total} correctas</div></div><button onClick={()=>{setQuizDone(d=>{const nd={...d};delete nd[chapter];return nd;});setQuizKey(k=>k+1);}} style={{fontSize:12,padding:"8px 16px",borderRadius:7,border:"1px solid #e2e8f0",background:"#f8fafc",cursor:"pointer",color:"#64748b"}}>Repetir quiz</button></div>):(<Quiz key={quizKey} questions={ch.questions} color={ch.color} light={ch.light} onComplete={handleQuizComplete}/>)}</div>}
        </div>

        <div style={{padding:"10px 18px 14px",borderTop:"1px solid #f1f5f9",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <button onClick={()=>goChapter(chapter-1)} disabled={chapter===0} style={{fontSize:12,padding:"8px 16px",borderRadius:7,border:"1px solid #e2e8f0",background:"#f8fafc",cursor:chapter===0?"not-allowed":"pointer",color:chapter===0?"#cbd5e1":"#374151"}}>← Anterior</button>
          <div style={{fontSize:11,color:"#94a3b8"}}>{chapter+1} / {CHAPTERS.length}</div>
          <button onClick={()=>goChapter(chapter+1)} disabled={chapter===CHAPTERS.length-1} style={{fontSize:12,padding:"8px 16px",borderRadius:7,border:`1px solid ${ch.color}`,background:ch.color,color:"#fff",cursor:chapter===CHAPTERS.length-1?"not-allowed":"pointer",opacity:chapter===CHAPTERS.length-1?.5:1}}>Siguiente →</button>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<CalarisGuia />);
</script>

<script>
// Hide loading, show content when React renders
window.addEventListener('load', () => {
  setTimeout(() => {
    const root = document.getElementById('root');
    const loading = document.getElementById('loading');
    if (root && root.children.length > 0) {
      loading.style.display = 'none';
      root.style.display = 'block';
    } else {
      const observer = new MutationObserver(() => {
        if (root.children.length > 0) {
          loading.style.display = 'none';
          root.style.display = 'block';
          observer.disconnect();
        }
      });
      observer.observe(root, { childList: true });
    }
  }, 100);
});

// Register SW
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
