    id:"lean-agile", group:"fundamentos", title:"Mentalidad Lean-Agile", icon:"🧠",
    color:"#7C3AED", light:"#EDE9FE", border:"#C4B5FD", text:"#4C1D95",
    functional:`La Mentalidad Lean-Agile es la base filosófica de SAFe — antes de entender cualquier ceremonia, rol o artefacto, necesitás entender por qué existen.

LEAN busca entregar el máximo valor al cliente en el menor Lead Time posible, eliminando todo desperdicio. Sus 5 principios son:
1. Especificar el valor por cada producto (solo el cliente final puede definirlo)
2. Identificar la cadena de valor (todos los pasos para entregar esa solución)
3. Lograr que el valor fluya sin interrupciones (eliminar esperas y cuellos de botella)
4. Permitir que el cliente "arrastre" valor (demanda real, no producción especulativa)
5. Buscar la perfección (mejora continua — es un viaje sin destino final)

AGILE es una mentalidad, no un conjunto rígido de reglas. El Manifiesto Ágil valora:
→ Individuos e interacciones SOBRE procesos y herramientas
→ Software que funciona SOBRE documentación extensiva
→ Colaboración con el cliente SOBRE negociación contractual
→ Respuesta ante el cambio SOBRE seguir un plan

Combinados, Lean y Agile crean un sistema que optimiza el flujo, responde al cambio y entrega valor al cliente de manera continua y eficiente.`,
    technical:`Los 8 principios de FLUJO Lean aplicados al Big Picture de SAFe:

1. Visualizar y limitar el WIP: demasiado trabajo simultáneo bloquea el flujo
2. Abordar cuellos de botella: el eslabón más lento define la velocidad del sistema
3. Minimizar traspasos y dependencias: cada traspaso introduce demora y pérdida de contexto
4. Obtener feedback rápido: ciclos cortos permiten corregir antes de que el error escale
5. Trabajar en lotes pequeños: reduce Lead Time y acelera el aprendizaje
6. Gestionar la longitud de las colas: colas largas = Lead Time largo
7. Optimizar tiempo "en estado de flow": eliminar interrupciones y cambios de contexto
8. Corregir políticas obsoletas: los procesos que frenan el valor deben cambiar

CONEXIÓN CON EL BIG PICTURE:
→ Flecha verde de "Flow": objetivo de todos estos principios — trabajo fluyendo sin interrupciones
→ Flecha amarilla de "Feedback" (derecha a izquierda): cierra el ciclo de aprendizaje
→ "Release on Demand": principio 4 — el cliente arrastra el valor cuando lo necesita

Dato oficial del PDF SAFe 2025:
"Adoptar Lean puede duplicar la productividad, reducir el Time to Market a la mitad y permitir una oferta más variada a bajo costo adicional." — Womack y Jones, Lean Thinking`,
    visual:{ type:"lean-agile-mindset" },

      {
        q:"¿Cuál es la diferencia entre Lean y Agile según el e-book oficial de SAFe 2025?",
        opts:["Lean es para hardware; Agile es para software","Lean elimina desperdicios y optimiza el flujo; Agile garantiza adaptabilidad y respuesta al cambio — juntos crean un sistema de mejora continua","Son sinónimos — SAFe los usa indistintamente","Lean es un framework; Agile es una técnica más específica"],
        correct:1,
        explanation:"El SAFe Explained 2025: 'Lean se centra en entregar el máximo valor con el mínimo desperdicio posible, mientras que Agile garantiza la adaptabilidad y la capacidad de respuesta al cambio. Juntos, crean un sistema que mejora continuamente, aprende y entrega valor al cliente de manera eficiente.'"
      },

        opts:["Documentación extensiva","Negociación contractual","Colaboración con el cliente","Seguir un plan"],
        correct:2,
        explanation:"Los 4 valores priorizados (izquierda): Individuos e interacciones, Software que funciona, Colaboración con el cliente, Respuesta ante el cambio. Los de la derecha tienen valor pero menor prioridad."

        correct:2,
        explanation:"Release on Demand aplica el principio Lean de 'pull': el cliente activa el release cuando lo necesita, en lugar de que la organización lance productos especulativamente. Elimina el desperdicio de construir sin demanda real."
      }
    ]

  {
    id:"big-picture", group:"fundamentos", title:"El Big Picture", icon:"🗺️",
    color:"#7C3AED", light:"#EDE9FE", border:"#C4B5FD", text:"#4C1D95",
    functional:`El Big Picture de SAFe es el mapa visual completo del framework. Es la guía de implementación que muestra cómo la estrategia empresarial y la ejecución de equipos se conectan en una sola cadena de valor.

CÓMO LEERLO de arriba hacia abajo:
→ Portfolio (cima): estrategia, financiamiento, Epics, Value Streams
→ Program / ART (medio): coordinación de múltiples equipos, PI Planning
→ Team / CDP (base): ejecución en sprints de 2 semanas

CÓMO LEERLO de izquierda a derecha:
Enterprise/Government → Portfolio Leadership → Portfolio Strategy → Portfolio Backlog → Epics → Value Streams → ART → Iterations → Release on Demand → Cliente

FLECHA DE FLOW (verde, izq→der): objetivo Lean de flujo continuo sin interrupciones.
FLECHA DE FEEDBACK (amarilla, der→izq): el cliente retroalimenta, cerrando el ciclo.
BUSINESS VALUE (curva verde ascendente): el valor de negocio crece a medida que se entregan Features y se acerca el Release on Demand al cliente.

BARRA INFERIOR (fondo oscuro teal): los elementos transversales — Mindset & Values, SPCs, Implementation Roadmap, Customizing SAFe, Measure & Grow — sostienen filosófica y operativamente todo lo demás.`,
    technical:`LAS 4 CONFIGURACIONES de SAFe según complejidad:

ESSENTIAL SAFe: mínimo viable. Team + Program (1 ART). Para organizaciones que recién empiezan o tienen pocos equipos.

LARGE SOLUTION SAFe: agrega el nivel de Solución Grande. Para múltiples ARTs coordinados en un mismo sistema complejo. Incluye Solution Train, Solution Architect, Solution Management.

PORTFOLIO SAFe: agrega gestión de portfolio. Para organizaciones que necesitan alinear múltiples Value Streams con la estrategia empresarial.

FULL SAFe: los 4 niveles completos. Para las organizaciones más grandes y complejas del mundo.

Los 5 ELEMENTOS TRANSVERSALES del Big Picture (barra inferior):
1. Mindset, Values & Principles: la base filosófica sin la cual todo lo demás es "agilidad cosmética"
2. SPCs & ASPCs: los coaches certificados que implementan SAFe (SAFe Program Consultants)
3. Implementation Roadmap: 13 pasos para implementar SAFe en una organización
4. Customizing SAFe: cómo adaptar el framework al contexto específico
5. Measure & Grow: métricas para evaluar la madurez y el impacto de la implementación`,
    visual:{ type:"big-picture-map" },
    questions:[
      {
        q:"¿Qué representa la flecha de 'Feedback' (amarilla, de derecha a izquierda) en el Big Picture?",
        opts:["El flujo de dinero del Portfolio hacia los equipos","El aprendizaje del cliente y el mercado que retroalimenta el backlog y mejora el próximo ciclo de planificación","La comunicación del RTE hacia los equipos durante el PI","El retorno de inversión que evalúa el Portfolio Leadership"],
        correct:1,
        explanation:"La flecha de Feedback cierra el ciclo Lean: el cliente usa el producto, genera datos y aprendizaje, ese aprendizaje vuelve al Portfolio y al ART Backlog para mejorar el próximo ciclo. Es la manifestación del 5° principio Lean: buscar la perfección continuamente."

        q:"¿Qué configuración de SAFe usarías en una empresa con 3 ARTs coordinando el mismo sistema pero sin necesidad de gestión de portfolio formal?",
        opts:["Essential SAFe — siempre empezar por lo mínimo","Large Solution SAFe — para múltiples ARTs coordinados","Portfolio SAFe — cualquier empresa con más de 1 ART lo necesita","Full SAFe — usar siempre la configuración más completa"],

        explanation:"Large Solution SAFe es para múltiples ARTs que necesitan coordinarse (Solution Train) pero sin la capa de Portfolio todavía. Essential SAFe es para 1 solo ART. Portfolio SAFe agrega la gestión estratégica de inversiones y Value Streams."

        correct:1,
        explanation:"Scrum es excelente para un equipo de 7–10 personas. SAFe resuelve los problemas que emergen cuando hay docenas de equipos: coordinar dependencias, sincronizar releases, alinear estrategia con ejecución y gestionar el portfolio de inversiones."

  {
    id:"cinco-disciplinas", group:"fundamentos", title:"Las 5 Disciplinas", icon:"🎯",
    color:"#7C3AED", light:"#EDE9FE", border:"#C4B5FD", text:"#4C1D95",
    functional:`Las 5 Disciplinas de SAFe son la estructura de conocimiento del framework. Cada una describe las habilidades, prácticas y herramientas necesarias para operar en ese nivel.

1. LIDERAZGO Y CULTURA (L&C): LA BASE.
Los líderes moldean la cultura con sus decisiones y comportamientos. 4 patrones de liderazgo: Liderar con el ejemplo, Desarrollar líderes (coaching no microgestión), Liderar el cambio (visión e inspiración), Adaptarse e innovar. La cultura generativa (Westrum) fomenta trabajo en equipo, comunicación abierta y aprendizaje.

2. AGILIDAD TÉCNICA Y DE EQUIPO (TTA):
Equipos multifuncionales que incorporan calidad en todo lo que entregan. SAFe Scrum, SAFe Kanban, DevOps, Calidad Incorporada, CI/CD, Plataforma de Arquitectura.

3. FLUJO DE DESARROLLO DEL PRODUCTO (PDF):
Visión clara → Roadmap flexible → Design Thinking → Entrega continua → Marketing de producto → Sistemas de feedback. La innovación es un proceso gestionado, no un accidente.

4. INTEGRACIÓN Y ENTREGA DE SOLUCIONES GRANDES (LSID):
Para sistemas ciberfísicos complejos (defensa, satélites, vehículos autónomos). Múltiples ARTs + Proveedores. Solution Trains coordinados.

5. GESTIÓN LEAN DEL PORTAFOLIO (LPM):
Conecta estrategia con ejecución. Reemplaza financiación por proyectos con financiación por Value Streams. Kanban de Portfolio para Epics.`,
    technical:`RESULTADOS DE NEGOCIO documentados en el PDF oficial de SAFe 2025:
→ 30–75% de reducción en Time to Market
→ 20–50% de aumento en productividad
→ 25–75% de mejoras en calidad
→ 10–50% de empleados más comprometidos

LA VMO (Value Management Office / Oficina de Gestión de Valor):
→ Gobernanza y operaciones diarias del portfolio
→ Reporta y comunica el desempeño del portfolio
→ Mide contra OKRs y KPIs definidos
→ Si los datos indican cambio de rumbo, se ajusta la estrategia

EL ROADMAP DE IMPLEMENTACIÓN (13 pasos resumidos):
1. Capacitar agentes de cambio Lean-Agile (SPCs)
2. Capacitar ejecutivos, managers y líderes
3. Crear Centro de Excelencia Lean-Agile
4. Identificar Value Streams y ARTs
5. Preparar lanzamiento del ART
6. Capacitar equipos y lanzar el ART
7. Ejecutar iteraciones (usar SAFe)
8. Lanzar más ARTs y Value Streams
9. Ampliar el portfolio
10. Acelerar con mejora continua

SEGÚN EL PDF: "SAFe es reconocido por Gartner como el framework más considerado y adoptado para escalar Agile." Más de 20.000 organizaciones lo usan, incluidas 70 de la Fortune 100.`,

        correct:2,
        explanation:"El PDF: 'Implementar esta cultura garantiza el circuito social que es fundamental para el éxito en la adopción de SAFe como la manera de trabajar de la organización.' L&C es la base de la pirámide de las 5 Disciplinas — sin ella, las otras cuatro son superficiales."

      },

        opts:["Cultura donde los managers generan todas las ideas y los equipos ejecutan","Cultura que fomenta trabajo en equipo, comunicación abierta y orientación común a los objetivos, basada en confianza, transparencia y mentalidad de aprendizaje","Cultura orientada a generar el máximo retorno financiero con mínimo costo","Cultura donde se generan muchos procesos y documentación para garantizar consistencia"],
        correct:1,
        explanation:"Westrum define cultura generativa como la que fomenta trabajo en equipo, comunicación abierta y un enfoque común en los objetivos. La confianza, la transparencia y la mentalidad de aprendizaje impulsan la colaboración y la mejora continua — lo opuesto a las culturas patológicas o burocráticas."
      }

  // ══════════ ESTRUCTURA ══════════

  {
    id:"portfolio", group:"estructura", title:"Nivel Portfolio", icon:"🏛️",
    color:"#16A34A", light:"#DCFCE7", border:"#86EFAC", text:"#14532D",
    functional:`El nivel Portfolio es la franja superior del Big Picture — donde la estrategia empresarial se convierte en trabajo concreto. Las "vías" horizontales (Value Streams) conectan el Portfolio con Products & Solutions.

INPUTS del Portfolio en el Big Picture:
→ Enterprise (empresas privadas) y Government (organizaciones públicas) definen la dirección estratégica.
→ Portfolio Leadership (líderes senior: CTO, CPO, CFO) toman decisiones de inversión.

EL FLUJO del Portfolio (izquierda a derecha en el Big Picture):
Portfolio Leadership → Portfolio Strategy → Portfolio Backlog → Epics → Value Streams → "Coordinate and Deliver" → Products & Solutions

ÉPICAS — la unidad del Portfolio:
Es la iniciativa más significativa de negocio o técnica. Puede durar meses o años. Requiere un Lean Business Case.
→ Business Epic: valor directo al cliente ("nueva plataforma de pagos internacional")
→ Enabler Epic: capacidad técnica necesaria ("migración a microservicios")

VALUE STREAMS — las "vías" del Big Picture:
Secuencia de actividades que crea y entrega valor al cliente.
→ Operational Value Streams: flujos que entregan valor directamente (vender, procesar pedidos)
→ Development Value Streams: crean los sistemas que soportan a los operacionales`,
    technical:`EL KANBAN DE PORTFOLIO — cómo fluyen las Épicas:

ESTADOS: Funnel → Revisión → Análisis → Listo → Implementación → Terminado

Funnel: ideas capturadas de múltiples fuentes
Revisión: evaluación del potencial estratégico
Análisis: desarrollo del Lean Business Case (hipótesis, costo estimado, MVP)
Listo: aprobada para implementación en el próximo PI
Implementación: los ARTs la ejecutan en sus PIs
Terminado: completada — o decisión de STOP si el MVP no valida la hipótesis

LEAN STARTUP en el Portfolio:
El MVP permite testear la hipótesis antes de comprometerse con implementación completa.
En cualquier punto un Epic puede detenerse con decisión explícita de STOP.
Esto aplica el pensamiento Lean de "reducir lotes" y "obtener feedback rápido" al nivel de portfolio.

ROLES DEL PORTFOLIO:
→ Portfolio Leadership: formulan y comunican la estrategia
→ Epic Owners: guían las Épicas por el Kanban de Portfolio
→ Enterprise Architect: visión tecnológica y roadmap del portfolio
→ VMO: gobernanza y operaciones diarias del portfolio
→ Business Owners: participan en los ARTs y aseguran alineación estratégica

FINANCIACIÓN LEAN: presupuesto asignado a Value Streams (no a proyectos).
Esto da flexibilidad continua para priorizar — la cadena de valor siempre entrega lo más importante.`,
    visual:{ type:"portfolio-flow" },
    questions:[
      {
        q:"¿Qué contiene el Lean Business Case de una Épica en SAFe y para qué sirve?",
        opts:["Un documento de 50 páginas con especificaciones detalladas y presupuesto fijo","Una hipótesis de valor con costo estimado y MVP para testear antes de comprometerse con implementación completa","El cronograma de implementación dividido en sprints y milestones","El acuerdo contractual entre el Portfolio y los ARTs sobre qué se va a entregar"],
        correct:1,
        explanation:"El Lean Business Case aplica pensamiento Lean Startup: hipótesis de valor + costo estimado + MVP testeable. Si el MVP no valida la hipótesis, se puede hacer STOP sin haber invertido el presupuesto completo. Es lo opuesto a especificaciones detalladas con alcance fijo."
      },
      {
        q:"¿Cuál es la diferencia entre un Business Epic y un Enabler Epic?",
        opts:["Los Business Epics son más grandes; los Enabler Epics son más pequeños","Los Business Epics entregan valor directo al cliente; los Enabler Epics crean capacidad técnica (arquitectura, infra, deuda técnica) necesaria para futuras features","Los Business Epics son del Portfolio; los Enabler Epics son del ART","Son lo mismo — la diferencia es solo de nomenclatura interna"],
        correct:1,
        explanation:"Business Epic = iniciativa con valor directo y visible para el negocio o cliente. Enabler Epic = inversión en infraestructura, arquitectura o reducción de deuda técnica. Ambos requieren Lean Business Case y fluyen por el Portfolio Kanban — los Enablers son tan estratégicos como los de negocio."
      },
      {
        q:"¿Cuál es la función de los Business Owners en el ART según el PDF de SAFe 2025?",
        opts:["Gestionan el backlog del equipo junto al Product Owner","Son las principales partes interesadas del ART — participan activamente en sus eventos y tienen responsabilidad de negocio sobre ROI y aptitud para el uso","Son equivalentes al RTE representando al negocio","Solo participan en el PI Planning y no tienen rol durante la ejecución"],
        correct:1,
        explanation:"El PDF: 'Los Business Owners son las principales partes interesadas del ART y participan activamente en sus eventos. Tienen la responsabilidad técnica y de negocio de garantizar la aptitud para el uso, la gobernanza y el retorno de la inversión (ROI) de los productos.'"
      }
    ]
  },

  {
    id:"art-roles", group:"estructura", title:"ART, Roles y Equipos", icon:"👥",
    color:"#16A34A", light:"#DCFCE7", border:"#86EFAC", text:"#14532D",
    functional:`El ART (Agile Release Train / Tren de Liberación Ágil) es la unidad operacional central del nivel Program. Aparece como la "locomotora" horizontal en el Big Picture coordinando múltiples equipos.

EL ART en números: 50–125 personas, 8–12 equipos, PI de 8–12 semanas.

3 ROLES DE LIDERAZGO DEL ART (los mismos 3 tipos de autoridad en cada nivel de SAFe):
→ Product Management: define y prioriza el ART Backlog (Features). AUTORIDAD DE CONTENIDO.
→ System Architect: arquitectura del sistema, NFRs, interfaces técnicas. AUTORIDAD TÉCNICA.
→ RTE (Release Train Engineer): facilita el ART completo, coach, líder servicial. ENTREGA DE VALOR.

3 ROLES DEL EQUIPO ÁGIL (la misma estructura en miniatura, nivel Team):
→ Product Owner: gestiona Team Backlog, acepta historias. AUTORIDAD DE CONTENIDO del equipo.
→ Miembros del equipo (10 o menos): definen, crean, prueban y liberan el incremento.
→ Scrum Master: elimina obstáculos, facilita eventos, promueve autogestión. ENTREGA DE VALOR.

EVENTOS DEL EQUIPO (cada 2 semanas / iteración):
1. Planificación de la Iteración: equipo selecciona backlog y define metas
2. Revisión de la Iteración: inspecciona el incremento y actualiza el backlog
3. Retrospectiva de la Iteración: reflexiona e identifica mejoras
+ Daily Syncs para coordinar y abordar bloqueos`,
    technical:`3 EVENTOS DEL ART — los más importantes:

1. PLANIFICACIÓN DEL PI: todos los equipos se alinean en una misión común y crean un plan de PI Objectives comprometidos. El evento más importante de SAFe.

2. DEMOSTRACIÓN DEL SISTEMA (System Demo): al final de CADA iteración, muestra el trabajo INTEGRADO de todos los equipos del ART. Requiere CI real. Los Business Owners y stakeholders dan feedback.

3. INSPECCIÓN Y ADAPTACIÓN (I&A): al final del PI. PI System Demo + Quantitative Measurement + Problem-Solving Workshop. Produce mejoras concretas con owner y fecha.

EVENTOS ADICIONALES de coordinación del ART:
→ PO Sync: Product Owners + Product Management alinean backlog y resuelven dependencias
→ Scrum of Scrums (Coach Sync): SMs y coaches coordinan impedimentos entre equipos
→ IP Iteration: sprint especial al final del PI para innovación, planning del próximo PI y deuda técnica

SHARED SERVICES (Servicios Compartidos):

    functional:`En SAFe el trabajo se organiza en una jerarquía de 3 niveles que conecta la estrategia del Portfolio con la ejecución diaria. Esta jerarquía es visible en el Big Picture.

EPIC (nivel Portfolio):
Iniciativa estratégica de meses o años. Requiere Lean Business Case. Se descompone en Features.
→ Business Epic: valor directo y visible al cliente
→ Enabler Epic: capacidad técnica que habilita futuras capacidades

FEATURE (nivel Program / ART):
Capacidad que el sistema debe proveer para satisfacer una necesidad de usuario o negocio. Se implementa en 1 PI (8–12 semanas). Vive en el ART Backlog gestionado por Product Management.
→ Feature de negocio (tarjetas AZULES en el Big Picture)
→ Enabler Feature: infra, arquitectura, investigación técnica (tarjetas ROJAS en el Big Picture)

STORY (nivel Team):
Unidad de trabajo del equipo. Comportamiento desde la perspectiva del usuario. Se implementa en 1 iteración (2 semanas). Vive en el Team Backlog del Product Owner.
→ Historia de usuario
→ Enabler Story: trabajo técnico que habilita futuras features

LA CADENA COMPLETA visible en el Big Picture:
Visión → Roadmap → ART Backlog (Features) → Team Backlogs (Stories) → Iterations → System Demos → Release on Demand`,

VISIÓN Y ROADMAP (inputs del ART Backlog en el Big Picture):
→ Visión: estado futuro del producto. Creada por Product Management. Alinea a todos los equipos.
→ Roadmap: plan de alto nivel de PIs con Features clave. NO es un Gantt — es una secuencia de compromisos aproximados que evoluciona.

    functional:`El PI Planning es EL evento más importante de SAFe. Dos días donde todos los equipos del ART se reúnen para planificar el próximo Program Increment juntos. En el Big Picture aparece en la base del CDP marcando el inicio de cada ciclo.

Con PI Planning: compromisos negociados, dependencias visibles en el Program Board, riesgos clasificados en el ROAM Board, y PI Objectives medibles para cada equipo.

¿QUÉ PRODUCE?

→ Program Board: dependencias entre equipos mapeadas visualmente

    id:"program-board", group:"planificacion", title:"Program Board", icon:"📌",

    functional:`El Program Board es el artefacto visual central del PI Planning. Muestra qué Features entrega cada equipo en cada sprint del PI y las dependencias entre equipos.

¿QUÉ PROBLEMA RESUELVE?
Sin Program Board: las dependencias son invisibles hasta que bloquean. Un equipo espera algo de otro que nunca supo que era necesario para esa fecha.
Con Program Board: las dependencias se convierten en acuerdos explícitos y compromisos públicos visibles para todo el ART.

ANATOMÍA DEL TABLERO:
→ FILAS: un equipo por fila
→ COLUMNAS: Sprint 1, Sprint 2, Sprint 3, Sprint 4, IP Sprint
→ TARJETAS AZULES: Features de negocio
→ TARJETAS ROJAS: Enablers técnicos
→ HILOS / FLECHAS ROJAS: dependencias entre equipos (acuerdos explícitos)
→ MILESTONE MARKERS: hitos fijos del negocio (release dates, demos contractuales)
→ PI OBJECTIVES: cada equipo documenta sus Committed y Uncommitted

¿CÓMO SE DIFERENCIA DEL ROAM BOARD?
→ Program Board = QUÉ entrega quién, CUÁNDO, y DEPENDENCIAS entre equipos
→ ROAM Board = RIESGOS clasificados en 4 categorías con dueños individuales`,
    technical:`SEÑALES DE ALERTA en el Program Board:

🔴 Muchas líneas convergiendo en el mismo sprint:
Cuello de botella — demasiadas dependencias en el mismo punto temporal. Acción: redistribuir Features o negociar timing.

🔴 Líneas que van hacia atrás en el tiempo (Sprint 3 → Sprint 2):
Dependencia imposible — el equipo que necesita algo lo necesita ANTES de que el otro pueda entregarlo. Acción: replanificar quién entrega qué y cuándo.

🔴 Equipos grandes sin ninguna dependencia marcada:
Señal de dependencias ocultas. En un sistema integrado, raramente hay equipos 100% independientes.

🔴 Múltiples Features en un sprint para un equipo con capacidad limitada:
Sobrecarga. Acción: mover Features a sprints posteriores o redistribuir.

MILESTONE MARKERS — conexión con el Portfolio:
Los milestones fijos (fechas contractuales, demos regulatorios, releases de mercado) vienen del Portfolio Leadership. El Program Board los hace visibles para todos los equipos que planifican sus Features respetando esas fechas. SAFe recomienda pocos milestones fijos — demasiados destruyen la flexibilidad ágil.

PRODUCTIVIDAD EN EL PI PLANNING:
El Program Board se construye en tiempo real durante los breakouts del Día 1. Los equipos negocian directamente entre sí — sin intermediarios. El RTE facilita la sesión general pero no decide las dependencias: son los equipos quienes las acuerdan.`,

    id:"roam", group:"planificacion", title:"ROAM Board", icon:"⚠️",
    color:"#D97706", light:"#FEF3C7", border:"#FCD34D", text:"#78350F",
    functional:`El ROAM Board es la herramienta de gestión de riesgos del PI Planning. Cada riesgo identificado durante la planificación se clasifica en una de 4 categorías. Ocurre en el Día 2 del PI Planning.

ROAM = Resolved · Owned · Accepted · Mitigated

R — RESOLVED: el riesgo YA NO EXISTE — fue resuelto durante el PI Planning mismo. El equipo encontró la información o confirmación que lo elimina.

O — OWNED: alguien ESPECÍFICO tomó el riesgo. Es personalmente responsable de gestionarlo y reportar su estado durante todo el PI. "El equipo" como dueño = nadie.

A — ACCEPTED: el riesgo existe, no puede mitigarse, y el ART acepta CONSCIENTEMENTE el impacto potencial. Es una decisión explícita documentada, no una omisión.

M — MITIGATED: existe un plan CONCRETO y documentado que reduce la probabilidad o el impacto del riesgo. No lo elimina, pero lo hace manejable.

¿QUÉ PROBLEMA RESUELVE?
Sin ROAM Board: los riesgos se mencionan en reuniones y se olvidan, apareciendo como sorpresas en Sprint 3.
Con ROAM Board: cada riesgo tiene un destino explícito con una decisión documentada y visible.`,
    technical:`EJEMPLOS PRÁCTICOS por categoría:

RESOLVED: "El equipo de infraestructura confirmó esta mañana que el entorno de staging estará disponible antes del Sprint 1." → Ya no es un riesgo. Se retira del tablero activo.

OWNED: "La dependencia con el proveedor de pagos externo la toma Carlos García (Product Manager) — reporta su estado al RTE todos los martes." → Nombre específico + cadencia de reporte.

ACCEPTED: "Si el equipo legal no aprueba los términos del contrato antes del Sprint 2, el módulo de pagos internacionales no entrará en producción este PI. Lo aceptamos como consecuencia conocida." → Decisión explícita del ART con impacto documentado.

MITIGATED: "Si la API del proveedor principal falla la integración, tenemos un plan B documentado: API alternativa con las mismas interfaces ya evaluadas y contratadas." → Plan concreto, no especulativo.

SEÑALES DE UN ROAM MAL FACILITADO:
→ 80%+ de riesgos en Accepted: nadie quiere responsabilidad → el RTE debe facilitar Owned
→ Owned sin nombre propio: "el equipo" = nadie → escalar al RTE antes de cerrar
→ Mitigated sin plan escrito: "lo resolveremos durante el PI" = no es mitigación
→ ROAM Board vacío: planificación superficial — el ART no identificó riesgos reales

PREGUNTA DE ENTREVISTA FRECUENTE (NTT DATA):
"¿Qué hacés si hay una dependencia crítica sin owner en el PI Planning?"
RESPUESTA: la marcás en el Program Board + la ROAMeás como O (Owned, pendiente de asignación) + escalás al RTE para que asigne un owner individual antes de cerrar el PI Planning.`,

  {
    id:"cdp", group:"delivery", title:"Continuous Delivery Pipeline", icon:"🔄",
    color:"#D97706", light:"#FEF3C7", border:"#FCD34D", text:"#78350F",
    functional:`El Continuous Delivery Pipeline (CDP) es la capa base azul del Big Picture — donde Features, Enablers y Stories fluyen a través de las Iterations hacia el Cliente a través de Release on Demand.

La flecha verde de "Flow" está sobre el CDP — es la manifestación técnica del objetivo Lean.

LOS 4 ASPECTOS DEL CDP:

1. EXPLORACIÓN CONTINUA (CE — Continuous Exploration):
Identifica QUÉ construir. Hipótesis de negocio, design thinking, investigación de usuario, análisis de mercado. Alimenta el ART Backlog con Features y Enablers validadas.

2. INTEGRACIÓN CONTINUA (CI — Continuous Integration):
CÓMO construirlo. Cada commit integrado y testeado automáticamente. Elimina el "integration hell". Hace posible el System Demo integrado en cada iteración.

3. DESPLIEGUE CONTINUO (CD — Continuous Deployment):
Código desplegado automáticamente a staging/producción. SEPARA deployment (técnico, automático) de release (decisión de negocio). Usa Feature Flags para controlar la activación.

4. RELEASE ON DEMAND:
CUÁNDO liberar AL CLIENTE. Decisión estratégica del negocio — el código puede estar en producción "apagado" hasta que el negocio decide activarlo. Son las flechas azules verticales hacia el Cliente en el Big Picture.

IP ITERATION (Innovation & Planning):
Sprint especial al FINAL del PI. NO es un buffer para atrasos — es tiempo protegido para innovación, planning del próximo PI y deuda técnica.`,
    technical:`LA PLATAFORMA DE ARQUITECTURA (Architecture Platform):

En el Big Picture aparece como la base horizontal del CDP. Es el código existente, componentes e infraestructura técnica que permite implementar Features con mínimo rediseño. El ART invierte continuamente en mantenerla mediante Enabler Features y Enabler Stories.

DEVOPS en el CDP:
La mentalidad DevOps fomenta comunicación, integración y automatización en TODAS las etapas. En el Big Picture, CE/CI/CD aparecen explícitamente como componentes del CDP.

CALIDAD INCORPORADA (Built-in Quality):
El PDF: 'Los equipos son responsables de incorporar calidad en todo lo que entregan. La inspección suele llegar demasiado tarde para ser eficaz.'
Prácticas de Built-in Quality:
→ TDD/BDD: tests escritos antes del código
→ Peer review: revisión antes de merge
→ CI con Quality Gates: cobertura mínima, cero vulnerabilidades críticas
→ System Demo: validación integrada cada iteración
→ Definition of Done con criterios testeables

DEPLOYMENT vs RELEASE — diferencia crítica:
→ Deployment: código en el servidor de producción (automatizado, continuo, responsabilidad técnica)
→ Release on Demand: código activado para el usuario final (decisión de negocio, timing estratégico)
Esta separación permite desplegar frecuentemente y liberar al cliente en el momento óptimo.

FRECUENCIA DE RELEASES en SAFe:
El PDF menciona que algunos ARTs hacen releases diarios o múltiples al día. Otros semanales o mensuales. SAFe no prescribe la frecuencia — el ART la define según sus capacidades y necesidades del negocio.`,

    functional:`Inspect & Adapt (I&A) es el evento de mejora continua del ART al FINAL de cada PI. En el Big Picture aparece en el extremo derecho del CDP, antes de que el ciclo vuelva a comenzar con el próximo PI Planning.

    functional:`La Disciplina de Flujo de Desarrollo del Producto (PDF) permite a las organizaciones liberar incrementos de producto valiosos y responder a los cambios del mercado con rapidez. En el Big Picture, esta disciplina se conecta con los elementos de la izquierda del CDP: Visión, Roadmap, Product Innovation y la flecha de Feedback.

El enfoque tradicional "si lo construyes, vendrán" ya no funciona. SAFe propone un modelo operativo en torno al producto que va mucho más allá del desarrollo:

VISIÓN: estado futuro del producto claramente definido que alinea a todos los equipos. Aparece en el Big Picture a la izquierda del ART Backlog.

ESTRATEGIA (ROADMAP): plan flexible de cómo y cuándo se entregarán las capacidades principales. No es un Gantt — es una secuencia de PIs con Features clave que evoluciona.

DISEÑO CENTRADO EN EL CLIENTE (Design Thinking): un enfoque que prioriza la experiencia del cliente y la resolución de problemas reales. Aplica técnicas como entrevistas, prototipos y validación rápida de hipótesis.

ENTREGA CONTINUA: proceso optimizado que mueve ideas desde el concepto hasta el mercado de forma eficiente — el Continuous Delivery Pipeline en el Big Picture.

MARKETING DE PRODUCTO: comunicación estratégica que destaca el valor del producto y resuena con el público objetivo.

SISTEMAS DE FEEDBACK: los datos reales del cliente retroalimentan continuamente el ciclo — la flecha amarilla ← Feedback del Big Picture.

PRODUCT INNOVATION: en el Big Picture aparece como la bombilla con rayos de luz a la izquierda del CDP — representa la capacidad de innovar continuamente como ventaja competitiva.`,
    technical:`LOS 6 ELEMENTOS DEL FLUJO DE DESARROLLO DEL PRODUCTO (Figura 10 del PDF):

1. INNOVACIÓN → VISIÓN: la innovación alimenta la visión del producto
2. VISIÓN → ESTRATEGIA: la visión define el roadmap flexible
3. ESTRATEGIA → DISEÑO CENTRADO EN EL CLIENTE: el roadmap guía el design thinking
4. DISEÑO CENTRADO EN EL CLIENTE → ENTREGA CONTINUA: el diseño validado fluye hacia el CDP
5. ENTREGA CONTINUA → MARKETING: el producto listo se comunica al mercado
6. MARKETING → CLIENTE → FEEDBACK → (de vuelta a INNOVACIÓN): el ciclo se cierra

CONEXIÓN CON LA BIG PICTURE:
→ Innovación de Producto: el ícono de bombilla a la izquierda del CDP
→ Visión + Roadmap: inputs directos del ART Backlog
→ Continuous Delivery Pipeline: el proceso de entrega continua
→ Release on Demand: cuándo el valor llega al Cliente
→ Feedback (flecha amarilla): cierra el ciclo de aprendizaje

PARA EL SM / AGILE COACH EN LA PRÁCTICA:

→ Facilitar que el Roadmap sea flexible (no un plan rígido con fechas fijas)

→ Medir el feedback del cliente — no solo las métricas técnicas internas

MÉTRICAS CLAVE del Flujo de Desarrollo del Producto:
→ Time to Market: tiempo desde la idea hasta que el cliente puede usar el feature
→ Feature Adoption Rate: % de usuarios que adoptan nuevas features
→ Customer Satisfaction (NPS): feedback del cliente sobre el valor entregado
→ Product Market Fit: qué tan bien el producto resuelve el problema del cliente`,

    functional:`La Disciplina de Integración y Entrega de Soluciones Grandes (LSID) aplica SAFe al desarrollo, operación y evolución de los sistemas más grandes y complejos del mundo. En el Big Picture, esta disciplina se representa en el nivel de Portfolio con la sección "Coordinate and Deliver" y los múltiples Value Streams que convergen en Products & Solutions.

¿CUÁNDO APLICA LSID?
Cuando una solución requiere el trabajo coordinado de múltiples ARTs, cadenas de valor y proveedores externos. Ejemplos: sistemas de defensa, satélites, vehículos autónomos, plataformas bancarias a escala nacional.

EL SOLUTION TRAIN:
Es la estructura que coordina múltiples ARTs. Así como el ART coordina múltiples equipos, el Solution Train coordina múltiples ARTs. Tiene sus propios roles de liderazgo (mismo patrón: autoridad de contenido + autoridad técnica + entrega de valor).

LA MISMA ESTRUCTURA DE 3 ROLES en cada nivel de SAFe:
→ Equipo: PO + Team Members + SM
→ ART: Product Management + System Architect + RTE
→ Solution Train: Solution Management + Solution Architect + STE (Solution Train Engineer)

COORDINAR Y ENTREGAR (en el Big Picture):
La sección "Coordinate and Deliver" en el Big Picture representa el nivel de coordinación entre múltiples ARTs/Value Streams antes de que el valor llegue a "Products and Solutions".`,
    technical:`COMPONENTES DEL NIVEL LARGE SOLUTION (Figura 11 del PDF):

INTENCIÓN DE LA SOLUCIÓN:
Documento vivo que captura los requisitos y restricciones de la solución completa. Es el equivalente del Product Vision pero para el Solution Train completo. No es una especificación detallada — es una intención flexible.

PLANIFICACIÓN PREVIA (Pre-PI Planning):
Antes del PI Planning de cada ART, los líderes del Solution Train se alinean en los grandes objetivos y dependencias entre ARTs. Asegura que cada ART llegue a su PI Planning con contexto claro.

DEMOSTRACIÓN DE LA SOLUCIÓN (Solution Demo):
Equivalente del System Demo pero para el Solution Train completo. Integra el trabajo de múltiples ARTs en una demostración del sistema total.

INSPECT AND ADAPT a nivel Solution Train:
Al final de cada PI, el Solution Train también hace su propio I&A para identificar mejoras en la coordinación entre ARTs.

PROVEEDORES (Suppliers) en el Big Picture:
Aparecen como participantes en las cadenas de valor. Los proveedores externos con entregables críticos participan en el PI Planning y sus dependencias se gestionan igual que las dependencias internas.

CUÁNDO NO NECESITÁS LSID:
La mayoría de las organizaciones medianas no necesitan LSID. Si tu organización tiene 1–3 ARTs coordinando el mismo sistema, Essential SAFe o Large Solution SAFe es suficiente. LSID aplica cuando hay decenas de ARTs, cientos de equipos y años de ciclos de desarrollo.

    functional:`Implementar SAFe requiere un esfuerzo significativo y sostenido. Los estudios indican que hasta el 70% de las iniciativas de cambio organizacional a gran escala no logran sus objetivos. SAFe proporciona un Roadmap de implementación de 13 pasos basado en experiencias de cientos de organizaciones.

    technical:`EL ROADMAP DE IMPLEMENTACIÓN DE SAFe — pasos clave (Figura 13 del PDF):

5. Preparar el lanzamiento del ART

CERTIFICACIONES DE SAFe más relevantes para tu perfil (Luis Otoya):
→ SAFe Scrum Master (SSM): rol de SM en un ART

function Quiz({questions,color,light,onComplete}) {
  const [answers,setAnswers]=useState({});
  const [submitted,setSubmitted]=useState(false);
  function answer(qi,oi){if(submitted||answers[qi]!==undefined)return;setAnswers(a=>({...a,[qi]:oi}));}
  function submit(){
    if(Object.keys(answers).length<questions.length)return;
    const score=questions.reduce((s,q,i)=>s+(answers[i]===q.correct?1:0),0);
    setSubmitted(true);onComplete(score);
  }
  return(
    <div>
      {questions.map((q,qi)=>(
        <div key={qi} style={{marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:500,color:"#1e293b",marginBottom:8,lineHeight:1.5}}>{qi+1}. {q.q}</div>
          <div style={{display:"flex",flexDirection:"column",gap:5}}>
            {q.opts.map((o,oi)=>{
              let bg="#f8fafc",border="1px solid #e2e8f0",tc="#374151";
              if(answers[qi]===oi){bg=light;border=`1px solid ${color}`;tc="#1e293b";}
              if(submitted&&oi===q.correct){bg="#f0fdf4";border="1px solid #86efac";tc="#14532d";}
              if(submitted&&answers[qi]===oi&&oi!==q.correct){bg="#fef2f2";border="1px solid #fca5a5";tc="#7f1d1d";}
              return(<div key={oi} onClick={()=>answer(qi,oi)} style={{padding:"9px 13px",borderRadius:7,border,background:bg,cursor:submitted||answers[qi]!==undefined?"default":"pointer",fontSize:12,color:tc,transition:".15s",lineHeight:1.4}}>{o}</div>);
            })}
          </div>
          {submitted&&(<div style={{marginTop:8,padding:"8px 12px",background:answers[qi]===q.correct?"#f0fdf4":"#fef2f2",border:`1px solid ${answers[qi]===q.correct?"#86efac":"#fca5a5"}`,borderRadius:6,fontSize:12,color:answers[qi]===q.correct?"#14532d":"#7f1d1d",lineHeight:1.6}}>{answers[qi]===q.correct?"✓ ":"✗ "}{q.explanation}</div>)}
        </div>
      ))}
      {!submitted&&(<button onClick={submit} disabled={Object.keys(answers).length<questions.length} style={{marginTop:4,padding:"9px 20px",borderRadius:7,border:"none",background:Object.keys(answers).length<questions.length?"#e2e8f0":color,color:Object.keys(answers).length<questions.length?"#94a3b8":"#fff",fontSize:13,fontWeight:600,cursor:Object.keys(answers).length<questions.length?"not-allowed":"pointer"}}>Verificar respuestas</button>)}
    </div>
  );
}

function SAFeGuiaCompleta() {

  const [totalQ,setTotalQ]=useState(0);

  const ch=CHAPTERS[chapter];
  const pct=totalQ>0?Math.round((totalScore/totalQ)*100):0;
  const doneCh=Object.keys(quizDone).length;
  function handleQuizComplete(score){const prev=quizDone[chapter];if(!prev){setTotalScore(s=>s+score);setTotalQ(t=>t+ch.questions.length);}setQuizDone(d=>({...d,[chapter]:{done:true,score,total:ch.questions.length}}));}

      </div>

            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>

            </div>
          </div>);
        })}
      </div>
      <div style={{background:"#fff",border:"1px solid #e2e8f0",borderTop:"none"}}>
        <div style={{background:ch.light,borderBottom:`2px solid ${ch.border}`,padding:"14px 18px"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
            <div style={{width:42,height:42,borderRadius:10,background:ch.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{ch.icon}</div>
            <div style={{flex:1}}><div style={{fontSize:15,fontWeight:700,color:ch.text}}>{ch.title}</div><div style={{fontSize:11,color:ch.color,marginTop:2}}>{ch.questions.length} preguntas{quizDone[chapter]&&` · ${quizDone[chapter].score}/${quizDone[chapter].total} correctas`}</div></div>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{tabs.map(t=>(<button key={t.id} onClick={()=>setTab(t.id)} style={{fontSize:11,padding:"5px 12px",borderRadius:6,cursor:"pointer",background:tab===t.id?ch.color:"transparent",color:tab===t.id?"#fff":ch.text,border:`1px solid ${tab===t.id?ch.color:ch.border}`,fontWeight:tab===t.id?600:400,transition:".15s"}}>{t.label}</button>))}</div>
          </div>
        </div>
        <div style={{padding:"16px 18px"}}>
          {tab==="functional"&&(<div><div style={{fontSize:10,fontWeight:700,color:"#94a3b8",letterSpacing:".5px",marginBottom:10}}>¿QUÉ ES Y POR QUÉ IMPORTA?</div><div style={{fontSize:13,color:"#374151",lineHeight:1.8,whiteSpace:"pre-line"}}>{ch.functional}</div><div style={{marginTop:14,padding:"10px 14px",background:ch.light,border:`1px solid ${ch.border}`,borderRadius:8,fontSize:12,color:ch.text}}>Orden recomendado: <strong>Funcional → Técnico → Visual → ¿Lo entendí?</strong></div></div>)}

        </div>
        <div style={{padding:"10px 18px 14px",borderTop:"1px solid #f1f5f9",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <button onClick={()=>goChapter(chapter-1)} disabled={chapter===0} style={{fontSize:12,padding:"8px 16px",borderRadius:7,border:"1px solid #e2e8f0",background:"#f8fafc",cursor:chapter===0?"not-allowed":"pointer",color:chapter===0?"#cbd5e1":"#374151"}}>← Anterior</button>

        </div>
      </div>
    </div>
  );
}

    const root = document.getElementById('root');

    if (root && root.children.length > 0) {
      loading.style.display = 'none';
      root.style.display = 'block';

      const observer = new MutationObserver(() => {
        if (root.children.length > 0) {
          loading.style.display = 'none';
          root.style.display = 'block';
          observer.disconnect();
        }
      });
      observer.observe(root, { childList: true });
    }

});

}
